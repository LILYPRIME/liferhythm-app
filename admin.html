<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LifeRhythm Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0b0f14;--panel:#121924;--panel-soft:#182131;--line:#233047;--line-strong:#31405d;--text:#e8eef8;--muted:#8ea0bc;--accent:#f6b73c;--accent-soft:#f6b73c22;--green:#36c98f;--green-soft:#36c98f22;--red:#ff7d7d;--red-soft:#ff7d7d22;--blue:#61b7ff;--chip:#1e2a40;}
body{min-height:100vh;background:radial-gradient(circle at top,rgba(246,183,60,.18),transparent 32%),linear-gradient(180deg,#0b0f14 0%,#0f1723 100%);color:var(--text);font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;}
a{color:inherit;text-decoration:none;}button,input{font:inherit;}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.auth-card{width:min(380px,100%);background:rgba(18,25,36,.95);border:1px solid var(--line);border-radius:24px;padding:34px 28px 28px;box-shadow:0 22px 54px rgba(0,0,0,.28);} 
.auth-logo{font-size:26px;font-weight:900;letter-spacing:.02em;color:var(--accent);} .auth-sub{font-size:13px;color:var(--muted);line-height:1.7;margin:10px 0 22px;} .auth-input{width:100%;background:#0d131d;border:1px solid var(--line);border-radius:14px;padding:12px 14px;color:var(--text);margin-bottom:10px;outline:none;} .auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(246,183,60,.12);} .auth-btn{width:100%;border:none;border-radius:14px;padding:12px 16px;background:linear-gradient(135deg,#ffd36e,#f6b73c);color:#1d1300;font-weight:900;cursor:pointer;} .auth-error{margin-top:10px;color:var(--red);font-size:13px;min-height:18px;}
#dashboard{display:none;padding:24px;} .top-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--line);} .top-copy h1{font-size:24px;font-weight:900;letter-spacing:.01em;} .top-copy p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.7;} .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;} .admin-email{font-size:12px;color:var(--muted);padding:9px 12px;border-radius:999px;background:var(--panel);border:1px solid var(--line);} .top-btn{border-radius:999px;padding:9px 14px;font-size:12px;font-weight:800;cursor:pointer;border:1px solid var(--line-strong);background:var(--panel);color:var(--text);} .top-btn.primary{border-color:#6e5516;background:var(--accent-soft);color:var(--accent);} .top-btn:hover{opacity:.92;}
.error-box{display:none;margin-bottom:18px;padding:16px;border-radius:18px;border:1px solid var(--red);background:var(--red-soft);color:#ffd4d4;font-size:13px;line-height:1.7;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px;} .stat-card{background:rgba(18,25,36,.94);border:1px solid var(--line);border-radius:20px;padding:18px;} .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;} .stat-val{font-size:30px;font-weight:900;color:var(--accent);margin-top:10px;line-height:1;} .stat-sub{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:24px;} .chart-card{background:rgba(18,25,36,.94);border:1px solid var(--line);border-radius:20px;padding:18px;} .chart-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:14px;} .chart-empty{font-size:13px;color:var(--muted);padding:8px 0 4px;} .bar-row{display:grid;grid-template-columns:92px 1fr auto;gap:10px;align-items:center;margin-bottom:10px;} .bar-label{font-size:12px;color:var(--muted);text-align:right;} .bar-wrap{height:14px;border-radius:999px;background:#0d131d;border:1px solid #1b2536;overflow:hidden;} .bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#f6b73c,#ffe3a4);} .bar-fill.blue{background:linear-gradient(90deg,#4aa8ff,#9fd3ff);} .bar-fill.green{background:linear-gradient(90deg,#29c884,#9be3c0);} .bar-count{font-size:11px;color:var(--muted);min-width:32px;text-align:right;}
.section-title{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:800;color:var(--text);margin:24px 0 12px;} .section-meta{font-size:12px;color:var(--muted);font-weight:500;}
.table-wrap{background:rgba(18,25,36,.94);border:1px solid var(--line);border-radius:20px;overflow:auto;margin-bottom:22px;} table{width:100%;border-collapse:collapse;font-size:13px;min-width:980px;} thead{background:#0f1723;position:sticky;top:0;z-index:2;} th,td{padding:12px 14px;border-top:1px solid var(--line);vertical-align:top;} th{border-top:none;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;user-select:none;white-space:nowrap;} th.sorted{color:var(--accent);} tr:hover td{background:#101a28;}
.muted{color:var(--muted);} .mini-sub{display:block;font-size:11px;color:var(--muted);margin-top:4px;} .rank-badge,.source-badge,.pill,.progress-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800;white-space:nowrap;} .rank-bronze{background:#cd7f3222;color:#cd7f32;border:1px solid #cd7f3240;} .rank-silver{background:#c0c7d522;color:#c0c7d5;border:1px solid #c0c7d540;} .rank-gold{background:#ffd54a22;color:#ffd54a;border:1px solid #ffd54a40;} .rank-platinum{background:#dfe8ff22;color:#dfe8ff;border:1px solid #dfe8ff40;} .rank-diamond{background:#7fd8ff22;color:#7fd8ff;border:1px solid #7fd8ff40;} .source-badge{background:var(--chip);border:1px solid var(--line-strong);color:#d3def1;} .pill{background:var(--green-soft);border:1px solid #2c8c6b;color:#9ae2c4;margin:2px 6px 2px 0;} .pill.muted{background:#1a2434;border-color:var(--line);color:var(--muted);} .progress-stack{display:flex;flex-wrap:wrap;gap:6px;} .progress-badge{background:#172131;border:1px solid var(--line);color:var(--muted);} .progress-badge.done{background:var(--green-soft);border-color:#2d8d6b;color:#9ce5c6;} .progress-badge.current{background:#1c2430;border-color:#6e5516;color:#ffd98e;} .inline-btn{border:none;border-radius:999px;padding:7px 12px;background:#1d2a3f;color:#d9e6fb;font-size:11px;font-weight:800;cursor:pointer;} .inline-btn:hover{opacity:.92;}
.detail-row td{padding:0;background:#0e1622;} .detail-inner{padding:18px;} .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;} .detail-card{background:#101827;border:1px solid var(--line);border-radius:16px;padding:14px;} .detail-card h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;} .detail-list{display:flex;flex-direction:column;gap:8px;max-height:240px;overflow:auto;} .detail-item{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:8px 10px;border-radius:12px;background:#0c131f;}
.feedback-cell{min-width:220px;max-width:280px;white-space:pre-wrap;line-height:1.7;} .feedback-cell.empty{color:var(--muted);font-style:italic;} .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:11px;} .empty-row td{text-align:center;color:var(--muted);padding:24px;}
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(5,8,13,.55);align-items:center;justify-content:center;z-index:30;} .spinner{width:34px;height:34px;border:3px solid #203049;border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
@media (max-width:900px){#dashboard{padding:16px;}.top-bar{flex-direction:column;align-items:stretch;}.top-actions{justify-content:flex-start;}.charts-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">LifeRhythm Admin</div>
    <div class="auth-sub">テスター導線の進捗とフィードバックをまとめて確認できます。</div>
    <input class="auth-input" id="email" type="email" placeholder="メールアドレス" autocomplete="email"/>
    <input class="auth-input" id="pass" type="password" placeholder="パスワード" autocomplete="current-password"/>
    <button class="auth-btn" onclick="doLogin()">ログイン</button>
    <div class="auth-error" id="auth-err"></div>
  </div>
</div>
<div id="dashboard">
  <div class="top-bar">
    <div class="top-copy">
      <h1>LifeRhythm Admin</h1>
      <p>案内ページ → ゲスト開始 → 最初のやること → 初回解除 → フィードバックの流れを、同じ画面で追えるようにしています。</p>
    </div>
    <div class="top-actions">
      <span class="admin-email" id="admin-email-disp"></span>
      <button class="top-btn primary" onclick="loadData()">再読み込み</button>
      <button class="top-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="error-box" id="err-box"></div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="charts-grid" id="charts-grid"></div>
  <div class="section-title">登録ユーザー一覧 <span class="section-meta" id="user-count-label"></span></div>
  <div class="table-wrap">
    <table id="user-table">
      <thead><tr><th data-sort="displayName" onclick="sortUsers('displayName')">名前</th><th data-sort="job" onclick="sortUsers('job')">職業</th><th data-sort="rankOrder" onclick="sortUsers('rankOrder')">ランク</th><th data-sort="totalEarned" onclick="sortUsers('totalEarned')">累計コイン</th><th data-sort="coins" onclick="sortUsers('coins')">残高</th><th data-sort="streak" onclick="sortUsers('streak')">連続日数</th><th data-sort="todoDone" onclick="sortUsers('todoDone')">やること完了</th><th>解除中の娯楽</th><th>詳細</th></tr></thead>
      <tbody id="user-tbody"></tbody>
    </table>
  </div>
  <div class="section-title">ゲスト一覧 <span class="section-meta" id="guest-count-label"></span></div>
  <div class="table-wrap">
    <table id="guest-table">
      <thead><tr><th data-sort="job" onclick="sortGuests('job')">職業</th><th data-sort="age" onclick="sortGuests('age')">年齢</th><th data-sort="source" onclick="sortGuests('source')">導線</th><th data-sort="totalEarned" onclick="sortGuests('totalEarned')">累計コイン</th><th data-sort="todosDone" onclick="sortGuests('todosDone')">やること完了</th><th data-sort="streak" onclick="sortGuests('streak')">連続日数</th><th>解除した娯楽</th><th data-sort="progress" onclick="sortGuests('progress')">進捗</th><th data-sort="lastActive" onclick="sortGuests('lastActive')">最終アクティブ</th></tr></thead>
      <tbody id="guest-tbody"></tbody>
    </table>
  </div>
  <div class="section-title">最近のフィードバック <span class="section-meta" id="feedback-count-label"></span></div>
  <div class="table-wrap">
    <table id="feedback-table">
      <thead><tr><th data-sort="createdAt" onclick="sortFeedback('createdAt')">日時</th><th data-sort="source" onclick="sortFeedback('source')">導線</th><th data-sort="sessionId" onclick="sortFeedback('sessionId')">Session</th><th data-sort="guestId" onclick="sortFeedback('guestId')">Guest</th><th>わかりにくかった点</th><th>バグや違和感</th><th>使いたくなった / ならなかった理由</th><th>欲しい機能</th></tr></thead>
      <tbody id="feedback-tbody"></tbody>
    </table>
  </div>
</div>
<div id="loading-overlay"><div class="spinner"></div></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="./admin.js"></script>
</body>
</html>
