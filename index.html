<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>LifeRhythm — AI自律支援</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f4f4f5;--card:#ffffff;--card2:#e8e8e8;--accent:#18181b;--accent2:#52525b;--gold:#f59e0b;--red:#ef4444;--green:#10b981;--text:#18181b;--muted:#71717a;--border:#d4d4d8;}
:root.dark{--bg:#111111;--card:#1c1c1e;--card2:#2c2c2e;--accent:#d4d4d8;--accent2:#a1a1aa;--text:#f5f5f5;--muted:#a1a1aa;--border:#3f3f46;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Hiragino Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;border:none;font-family:inherit;}
input{font-family:inherit;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8e8e8 0%,#f4f4f5 100%);padding:20px;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 32px;width:100%;max-width:380px;}
.auth-logo{font-size:32px;font-weight:900;color:var(--text);margin-bottom:4px;}
.auth-tagline{font-size:13px;color:var(--muted);margin-bottom:28px;}
.auth-tabs{display:flex;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:8px;border-radius:9px;background:none;color:var(--muted);font-size:13px;font-weight:600;transition:all .2s;}
.auth-tab.active{background:var(--accent);color:#fff;}
:root.dark .auth-tab.active{background:var(--accent);color:var(--bg);}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.auth-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;transition:border .2s;}
.auth-input:focus{outline:none;border-color:var(--accent);}
.auth-submit{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:700;background:#18181b;color:#fff;margin-top:6px;}
:root.dark .auth-submit{background:#3f3f46;}
.auth-error{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px;}
.auth-consent{margin-top:10px;display:none;}
.auth-consent.show{display:block;}
.auth-consent label{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--muted);cursor:pointer;line-height:1.5;}
.auth-consent input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--accent);}
.auth-consent a{color:var(--accent);text-decoration:underline;}
.auth-name-field{display:none;}
.auth-name-field.show{display:block;}
.auth-job-field{display:none;}
.auth-job-field.show{display:block;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#main-app{display:none;flex-direction:column;min-height:100vh;}
#view{flex:1;padding-bottom:80px;}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;height:64px;z-index:100;}
:root.dark nav{background:var(--card2);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;color:var(--muted);padding:8px 0;font-size:10px;transition:color .2s;}
.nav-btn.active{color:var(--text);font-weight:700;}
.nav-btn .nav-icon{display:flex;align-items:center;justify-content:center;height:24px;}.nav-btn .nav-icon svg{width:21px;height:21px;stroke-width:1.9;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;}.todo-ai-btn svg{width:13px;height:13px;stroke-width:2;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;vertical-align:middle;}
.page-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
:root.dark .page-header{background:var(--card2);}
.logo{font-size:17px;font-weight:800;color:var(--text);}
.logo-sub{font-size:10px;color:var(--muted);}
.header-right{display:flex;align-items:center;gap:10px;}
.clock-box{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:5px 12px;text-align:center;}
.clock-time{font-size:17px;font-weight:700;letter-spacing:2px;}
.clock-date{font-size:10px;color:var(--muted);}
.user-chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:12px;display:flex;align-items:center;gap:6px;}
.logout-btn{background:none;color:var(--muted);font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);}
.logout-btn:hover{color:var(--red);border-color:var(--red);}
#mode-banner{padding:9px 18px;font-size:12px;font-weight:600;text-align:center;transition:all .5s;}
.mode-focus{background:var(--card2);border-bottom:2px solid var(--muted);color:var(--text);}
.mode-free{background:linear-gradient(90deg,#065f4622,#064e3b99);border-bottom:2px solid #10b981;color:var(--green);}
.container{max-width:680px;margin:0 auto;padding:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;}
.card+.card{margin-top:14px;}
.card-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;transition:transform .1s,opacity .15s;border:none;}
.btn:hover{transform:scale(1.03);}
.btn-primary{background:#18181b;color:#fff;}
:root.dark .btn-primary{background:#3f3f46;color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.progress-wrap{background:var(--card2);border-radius:999px;height:7px;overflow:hidden;}
.progress-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#3f3f46,#71717a);transition:width .5s ease;}
.coin-strip{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:14px;}
:root.dark .coin-strip{background:var(--card2);}
.coin-orb{width:54px;height:54px;flex-shrink:0;background:radial-gradient(circle at 35% 35%,#fde68a,#f59e0b,#b45309);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 18px #f59e0b44;}
.coin-val{font-size:36px;font-weight:900;background:linear-gradient(90deg,#fde68a,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.coin-label{font-size:12px;color:var(--muted);margin-top:2px;}
.coin-today{font-size:11px;color:var(--green);margin-top:4px;}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.todo-item:last-child{border-bottom:none;}
.todo-item.done{opacity:.5;}
.todo-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;cursor:pointer;transition:all .2s;}
.todo-item.done .todo-check{background:var(--green);border-color:var(--green);color:#fff;}
.todo-text{flex:1;font-size:14px;line-height:1.3;}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
.todo-reward{font-size:11px;font-weight:700;color:var(--gold);background:#f59e0b15;padding:3px 7px;border-radius:20px;border:1px solid #f59e0b33;white-space:nowrap;}
.todo-del{width:26px;height:26px;border-radius:6px;background:none;color:#71717a;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.todo-del:hover{background:#ef444420;color:var(--red);}
.todo-empty{text-align:center;padding:24px 0;color:var(--muted);font-size:13px;}
.add-todo-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.add-todo-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;}
.add-todo-input:focus{outline:none;border-color:var(--accent);}
.add-todo-btn{padding:9px 14px;border-radius:10px;background:var(--text);color:var(--bg);font-size:13px;font-weight:700;white-space:nowrap;}
.ent-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.ent-item:last-child{border-bottom:none;}
.ent-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ent-name{font-size:14px;font-weight:600;}
.ent-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.ent-price-area{text-align:right;flex-shrink:0;}
.ent-price{font-size:17px;font-weight:800;}
.ent-price-orig{font-size:10px;color:var(--muted);}
.price-surge{color:var(--red);}.price-sale{color:var(--green);}
.price-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:2px;}
.tag-surge{background:#ef444420;color:var(--red);border:1px solid #ef444440;}
.tag-sale{background:#10b98120;color:var(--green);border:1px solid #10b98140;}
.locked-url-btn{display:inline-flex;align-items:center;gap:4px;margin-top:5px;font-size:10px;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;}
.locked-url-btn:hover{opacity:.8;}
.buy-btn-locked{margin-top:5px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;border:none;transition:transform .1s;}
.buy-btn-locked:hover{transform:scale(1.05);}
.buy-btn-locked.surge{background:var(--red);color:#fff;}
.buy-btn-locked.sale{background:var(--green);color:#fff;}
.access-timer{font-size:20px;font-weight:800;color:var(--green);letter-spacing:1px;}
.access-timer-label{font-size:10px;color:var(--muted);margin-top:1px;}
.open-btn{display:block;margin-top:6px;padding:6px 14px;border-radius:8px;background:var(--green);color:#fff;font-size:12px;font-weight:700;border:none;width:100%;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center;}
.stat-val{font-size:24px;font-weight:800;}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;}
.rank-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center;}
:root.dark .rank-card{background:var(--card2);border-color:var(--border);}
.rank-badge-big{font-size:52px;margin-bottom:6px;}
.rank-name-big{font-size:22px;font-weight:800;}
.profile-hero{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;}
:root.dark .profile-hero{background:var(--card2);border-color:var(--border);}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:999px;cursor:pointer;transition:.3s;}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);}
.week-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid #f59e0b44;border-radius:16px;padding:14px;}
:root.dark .week-card{background:var(--card2);}
.week-active-tag{background:#f59e0b;color:#000;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:8px;}
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:500px;transform:translateY(40px);transition:transform .3s;max-height:80vh;overflow-y:auto;}

.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-size:14px;margin-bottom:10px;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.num-input{width:90px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:14px;text-align:center;}
.num-input:focus{outline:none;border-color:var(--accent);}
.history-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.history-item:last-child{border-bottom:none;}
.history-sign{font-size:16px;font-weight:800;}
.history-sign.plus{color:var(--green);}
.history-sign.minus{color:var(--red);}
.history-desc{flex:1;font-size:13px;}
.history-time{font-size:11px;color:var(--muted);}
#toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(100px);opacity:0;pointer-events:none;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;z-index:500;max-width:calc(100% - 32px);text-align:center;white-space:normal;word-break:break-word;cursor:pointer;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto;}
#notif-banner{display:none;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin:10px 18px 0;font-size:12px;align-items:center;gap:10px;}
#notif-banner.show{display:flex;}
.goal-banner{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:14px;font-size:13px;gap:8px;}
.goal-banner.can-unlock{background:var(--card2);border-color:var(--border);cursor:pointer;}
.goal-banner-label{color:var(--muted);font-size:11px;margin-bottom:2px;}
.goal-banner-val{font-size:15px;font-weight:800;}
.goal-banner-btn{background:var(--text);color:var(--bg);border:none;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.template-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0 4px;border-top:1px solid var(--border);margin-top:8px;}
.template-chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;font-size:11px;padding:4px 10px;color:var(--muted);cursor:pointer;transition:background .15s;white-space:nowrap;}
.template-chip:hover{background:var(--border);color:var(--text);}
.price-next{font-size:11px;color:var(--muted);text-align:center;padding:10px 0 0;border-top:1px solid var(--border);margin-top:10px;}
.todo-ai-btn{background:var(--card2);border:1px solid var(--border);border-radius:6px;font-size:12px;padding:2px 8px;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:background .15s;}
.todo-ai-btn:hover{background:var(--border);}.todo-ai-btn:disabled{opacity:0.5;cursor:not-allowed;}
.milestone-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;background:var(--card2);margin-bottom:8px;}
.milestone-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;}.milestone-coins{font-size:12px;color:var(--gold);font-weight:700;white-space:nowrap;}
.add-todo-reward-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.guest-btn{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--fg);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s;}
.guest-btn:hover{background:var(--border);}
.guest-form{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:12px;display:none;}
.guest-select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:14px;}
.guest-badge{background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;}
.tutorial-overlay.show{display:flex;}
.tutorial-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 28px;max-width:340px;width:90%;text-align:center;}
.tutorial-emoji{font-size:64px;margin-bottom:16px;}
.tutorial-title{font-size:20px;font-weight:800;margin-bottom:10px;}
.tutorial-desc{font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:24px;}
.tutorial-dots{display:flex;gap:7px;justify-content:center;margin-bottom:22px;}
.tutorial-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s;}
.tutorial-dot.active{background:var(--accent);}
.itut-bar{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);z-index:200;width:calc(100% - 24px);max-width:480px;cursor:grab;user-select:none;touch-action:none;}
.itut-bar.itut-dragging{cursor:grabbing;}
.itut-bar.itut-collapsed .itut-hint{display:none;}
.itut-bar.itut-collapsed .itut-ex{display:none!important;}
.itut-collapse-btn{background:none;border:none;color:#94a3b8;cursor:pointer;padding:3px 5px;border-radius:6px;flex-shrink:0;line-height:1;touch-action:auto;}
.itut-collapse-btn:hover{background:#f1f5f9;color:#475569;}
.itut-inner{background:#fff;border-radius:20px;padding:20px 22px;color:#27272a;box-shadow:0 8px 32px #00000022;border:1px solid var(--border);}
.itut-step-label{font-size:12px;color:#71717a;margin-bottom:4px;font-weight:600;letter-spacing:.03em;}
.itut-title{font-size:18px;font-weight:800;margin-bottom:9px;color:#18181b;}
.itut-hint{font-size:14px;color:#3f3f46;line-height:1.7;margin-bottom:12px;}
.itut-ex{background:#f1f5f9;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;cursor:pointer;border:1px solid #e2e8f0;color:#27272a;width:100%;text-align:left;line-height:1.6;}
.itut-ex:hover{background:#e2e8f0;}
.itut-skip{background:none;border:1px solid #cbd5e1;color:#71717a;padding:6px 16px;border-radius:8px;font-size:13px;cursor:pointer;}
.tut-again-btn{display:none;}
.tut-start-btn{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:700;background:#18181b;color:#fff;box-shadow:0 4px 18px #00000020;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;}
.tut-start-btn:hover{opacity:.9;}
:root.dark .tut-start-btn{background:#3f3f46;}
.auth-helper{margin-top:16px;font-size:12px;color:var(--muted);line-height:1.7;text-align:center;}
.feedback-fab{position:fixed;right:16px;bottom:82px;z-index:180;display:none;align-items:center;gap:8px;padding:11px 16px;border-radius:999px;background:#18181b;color:#fff;font-size:13px;font-weight:800;box-shadow:0 14px 28px #00000022;}
.feedback-fab.show{display:inline-flex;}
.feedback-fab:hover{opacity:.92;}
.mission-card{margin-bottom:14px;background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid #f59e0b44;border-radius:18px;padding:16px;}
.mission-kicker{font-size:11px;font-weight:800;letter-spacing:.08em;color:#a16207;text-transform:uppercase;}
.mission-title{font-size:17px;font-weight:800;margin-top:6px;}

<script>
const firebaseConfig={apiKey:"AIzaSyAch5QXGqpzu2ZzR4LGVuxiGmV8Y_BBt-I",authDomain:"liferhythm-cb0e2.firebaseapp.com",projectId:"liferhythm-cb0e2",storageBucket:"liferhythm-cb0e2.firebasestorage.app",messagingSenderId:"549059630729",appId:"1:549059630729:web:36fb8d5440644caab01858",measurementId:"G-F4K6WHLRF6"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.firestore();
const FEEDBACK_PAGE="feedback.html";
const ENTRY_PARAMS=new URLSearchParams(window.location.search);
const TESTER_ENTRY_SOURCE=ENTRY_PARAMS.get("src")==="lp"?"lp":"direct";
const TESTER_SESSION_KEY="liferhythm_tester_session_id";
const TESTER_SESSION_ID=getTesterSessionId();
function getTesterSessionId(){let value=localStorage.getItem(TESTER_SESSION_KEY);if(!value){value="ts_"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);localStorage.setItem(TESTER_SESSION_KEY,value);}return value;}
function emptyFunnel(){return{guestStartAt:null,tutorialCompleteAt:null,firstTodoAddedAt:null,firstTodoDoneAt:null,firstUnlockAt:null};}
function ensureGuestMeta(){if(!state)return;if(!state.funnel)state.funnel=emptyFunnel();if(!state.entrySource)state.entrySource=TESTER_ENTRY_SOURCE;if(!state.sessionId)state.sessionId=TESTER_SESSION_ID;}
function buildFeedbackHref(source){const params=new URLSearchParams();params.set("source",source||"app");params.set("session",TESTER_SESSION_ID);if(state&&state.guestFirestoreId)params.set("guest",state.guestFirestoreId);return FEEDBACK_PAGE+"?"+params.toString();}
function updateFeedbackFab(){const link=document.getElementById("feedback-fab");if(link){link.href=buildFeedbackHref("app");link.classList.add("show");}}
async function logTesterEvent(type,extra){try{await db.collection("testerEvents").add(Object.assign({type:type,source:TESTER_ENTRY_SOURCE,sessionId:TESTER_SESSION_ID,createdAt:Date.now()},extra||{}));}catch(e){}}
async function markGuestFunnelStep(field,eventType){if(!state||!state.isGuest)return;ensureGuestMeta();if(state.funnel[field])return;const ts=Date.now();state.funnel[field]=ts;if(state.guestFirestoreId){try{await db.collection("guests").doc(state.guestFirestoreId).set({funnel:state.funnel,tutorialDone:!!state.tutorialDone,lastActive:ts,source:state.entrySource,sessionId:state.sessionId},{merge:true});}catch(e){}}logTesterEvent(eventType,{guestId:state.guestFirestoreId||null}).catch(()=>{});scheduleSave();}
function buildTesterMission(){
  if(!state||!state.isGuest)return"";
  ensureGuestMeta();
  const items=[
    {done:!!state.funnel.firstTodoAddedAt,num:"1",label:"タスクを1件追加",desc:"ホームで短いタスクを1つ作ってみましょう。"},
    {done:!!state.funnel.firstTodoDoneAt,num:"2",label:"1件完了する",desc:"追加したタスクを完了してコインを受け取ります。"},
    {done:!!state.funnel.firstUnlockAt,num:"3",label:"SNSを1つ解除",desc:"ショップで好きな娯楽を1つ解除して体験完了です。"},
    {done:false,num:"4",label:"フィードバック送信",desc:"4問だけで大丈夫です。率直な感想をお願いします。"}
  ];
  const rows=items.map(item=>`<div class="mission-item${item.done?" done":""}"><div class="mission-dot">${item.done?"✓":item.num}</div><div><div class="mission-label">${item.label}</div><div class="mission-desc">${item.desc}</div></div></div>`).join("");
  return `<div class="mission-card"><div class="mission-kicker">tester mission</div><div class="mission-title">3分で「追加 → 完了 → 解除」を体験してください</div><div class="mission-sub">下の3ステップを終えたら、最後にフィードバックを送ってもらえるととても助かります。</div><div class="mission-list">${rows}</div><div class="mission-actions"><button class="mission-link primary" onclick="goto('shop')">ショップを見る</button><a class="mission-link secondary" href="${buildFeedbackHref("app")}" target="_blank" rel="noopener">フィードバック送信</a></div></div>`;
}

function defaultState(name){return{displayName:name||'ユーザー',coins:100,todayEarned:0,totalEarned:100,focusWeekActive:true,focusWeekMultiplier:2,focusWeekDaysLeft:3,streak:0,lastDate:today(),todos:[],history:[],settings:{weeklyBoost:true},nextId:1,access:{},theme:'light'};}
let state=null,currentUser=null,saveTimer=null;
function today(){const n=new Date();return n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate();}
// v0.5: 通知システム
const notified5min=new Set();
// v0.6: Gemini AI統合
let pendingMilestoneTodoId=null;
async function callGemini(prompt){try{const res=await fetch('https://liferhythm-gemini.daqiaoling0.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});if(!res.ok){const err=await res.json().catch(()=>({}));showToast('❌ AIエラー: '+(err.error||res.status));return null;}return await res.json();}catch(e){return null;}}
function applyTheme(){const isDark=(state&&state.theme==='dark');document.documentElement.classList.toggle('dark',isDark);}
function showNotifBanner(){if(typeof Notification!=='undefined'&&Notification.permission==='default')document.getElementById('notif-banner').classList.add('show');}
function requestNotifPermission(){if(typeof Notification==='undefined'){showToast('この環境では通知は利用できません');return;}Notification.requestPermission().then(p=>{document.getElementById('notif-banner').classList.remove('show');showToast(p==='granted'?'🔔 通知が許可されました！':'通知が拒否されました');if(state&&state.currentPage==='profile')renderPage();});}
function sendNotif(title,body){if(typeof Notification==='undefined'||Notification.permission!=='granted')return;try{new Notification(title,{body,icon:'https://em-content.zobj.net/source/apple/354/high-voltage_26a1.png'});}catch(e){}}
let authMode='login',pendingSignupJob='その他';
function switchTab(mode){authMode=mode;document.querySelectorAll('.auth-tab').forEach((t,i)=>{t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='signup'));});document.getElementById('auth-btn').textContent=mode==='login'?'ログイン':'アカウント作成';document.getElementById('name-field').classList.toggle('show',mode==='signup');document.getElementById('job-field').classList.toggle('show',mode==='signup');document.getElementById('signup-consent').classList.toggle('show',mode==='signup');if(mode==='signup')document.getElementById('signup-consent-check').checked=false;document.getElementById('auth-error').textContent='';}
function doAuth(){const email=document.getElementById('auth-email').value.trim(),pass=document.getElementById('auth-pass').value,name=document.getElementById('auth-name').value.trim()||'ユーザー',errEl=document.getElementById('auth-error');errEl.textContent='';if(!email||!pass){errEl.textContent='メールとパスワードを入力してください';return;}if(authMode==='signup'&&!document.getElementById('signup-consent-check').checked){errEl.textContent='プライバシーポリシーへの同意が必要です';return;}document.getElementById('auth-btn').textContent='処理中...';if(authMode==='login'){auth.signInWithEmailAndPassword(email,pass).catch(e=>{errEl.textContent=authErrMsg(e.code);document.getElementById('auth-btn').textContent='ログイン';});}else{if(pass.length<6){errEl.textContent='パスワードは6文字以上';document.getElementById('auth-btn').textContent='アカウント作成';return;}pendingSignupJob=(document.getElementById('auth-job')?.value)||'その他';auth.createUserWithEmailAndPassword(email,pass).then(cred=>cred.user.updateProfile({displayName:name})).catch(e=>{errEl.textContent=authErrMsg(e.code);document.getElementById('auth-btn').textContent='アカウント作成';});}}
function authErrMsg(c){const m={'auth/user-not-found':'メールアドレスが見つかりません','auth/wrong-password':'パスワードが間違っています','auth/email-already-in-use':'このメールはすでに使われています','auth/invalid-email':'メールアドレスの形式が正しくありません','auth/weak-password':'パスワードが短すぎます','auth/invalid-credential':'メールまたはパスワードが間違っています'};return m[c]||'エラー('+c+')';}
function doLogout(){const bar=document.getElementById('itut-bar');if(bar)bar.style.display='none';if(state&&state.isGuest){state=null;localStorage.removeItem('guestState');document.getElementById('main-app').style.display='none';document.getElementById('auth-screen').style.display='flex';}else{auth.signOut();}}
function toggleAdminLogin(){const p=document.getElementById('admin-login-panel');p.style.display=p.style.display==='none'?'block':'none';}
async function startGuest(){
  const ageValue=parseInt(document.getElementById("guest-age").value,10);
  const job=document.getElementById("guest-job").value||"未入力";
  if(!document.getElementById("guest-consent-check").checked){showToast("利用規約とプライバシーポリシーへの同意が必要です");return;}
  const age=Number.isFinite(ageValue)&&ageValue>=10&&ageValue<=100?ageValue:null;
  const startedAt=Date.now();
  state=defaultState("ゲスト");
  state.isGuest=true;
  state.guestAge=age;
  state.guestJob=job;
  state.tutorialDone=false;
  state.entrySource=TESTER_ENTRY_SOURCE;
  state.sessionId=TESTER_SESSION_ID;
  state.funnel=emptyFunnel();
  state.funnel.guestStartAt=startedAt;
  try{
    const ref=await db.collection("guests").add({age:age,job:job,source:TESTER_ENTRY_SOURCE,sessionId:TESTER_SESSION_ID,startedAt:startedAt,lastActive:startedAt,coins:state.coins,totalEarned:state.totalEarned,streak:0,todosDone:0,todosTotal:0,entertainmentsUnlocked:[],tutorialDone:false,funnel:state.funnel});
    state.guestFirestoreId=ref.id;
    await logTesterEvent("guest_start",{guestId:ref.id});
  }catch(e){}
  localStorage.setItem("guestState",JSON.stringify(state));
  document.getElementById("auth-screen").style.display="none";
  document.getElementById("loading").style.display="none";
  document.getElementById("main-app").style.display="flex";
  document.getElementById("user-name-disp").textContent="ゲスト";
  initApp();
}
const TUTORIAL_STEPS=[
  {e:"📝",t:"1. まずタスクを1件追加",d:"ホームで5〜15分くらいの短いタスクを1つ追加してみてください。AI提案のままでも大丈夫です。"},
  {e:"✅",t:"2. 追加したタスクを完了",d:"タスクを1件完了して、コインが増える流れを体験してみましょう。"},
  {e:"🔓",t:"3. SNSや娯楽を1つ解除",d:"ショップで好きな娯楽を1つ解除して、体験の最後まで進んでください。"}
];
let tutStep=0;
function showTutorial(){tutStep=0;renderTutStep();document.getElementById('tutorial-overlay').classList.add('show');}
function renderTutStep(){
  const s=TUTORIAL_STEPS[tutStep];
  document.getElementById("tut-emoji").textContent=s.e;
  document.getElementById("tut-title").textContent=s.t;
  document.getElementById("tut-desc").textContent=s.d;
  document.getElementById("tut-theme-choice").style.display="none";
  document.getElementById("tut-btn").style.display="block";
  document.getElementById("tut-btn").textContent=tutStep<TUTORIAL_STEPS.length-1?"??":"????";
  document.getElementById("tut-dots").innerHTML=TUTORIAL_STEPS.map((_,i)=>'<div class="tutorial-dot'+(i===tutStep?' active':'')+'"></div>').join("");
}
function finishTutorial(){document.getElementById("tutorial-overlay").classList.remove("show");state.tutorialDone=true;markGuestFunnelStep("tutorialCompleteAt","tutorial_complete");scheduleSave();startInteractiveTutorial();}
function tutNext(){tutStep++;if(tutStep>=TUTORIAL_STEPS.length){finishTutorial();return;}renderTutStep();}

(function(){let drag=false,sx=0,sy=0,bx=0,by=0;function getB(){return document.getElementById('itut-bar');}function startDrag(cx,cy){const bar=getB();if(!bar||bar.style.display==='none')return;const r=bar.getBoundingClientRect();bar.style.left=r.left+'px';bar.style.top=r.top+'px';bar.style.bottom='auto';bar.style.transform='none';drag=true;sx=cx;sy=cy;bx=r.left;by=r.top;bar.classList.add('itut-dragging');}function moveDrag(cx,cy){if(!drag)return;const bar=getB();if(!bar)return;bar.style.left=(bx+(cx-sx))+'px';bar.style.top=(by+(cy-sy))+'px';}function endDrag(){drag=false;const bar=getB();if(bar)bar.classList.remove('itut-dragging');}document.addEventListener('mousedown',e=>{if(e.target.closest&&e.target.closest('#itut-bar')&&!e.target.closest('button'))startDrag(e.clientX,e.clientY);});document.addEventListener('mousemove',e=>{moveDrag(e.clientX,e.clientY);});document.addEventListener('mouseup',endDrag);document.addEventListener('touchstart',e=>{if(e.target.closest&&e.target.closest('#itut-bar')&&!e.target.closest('button'))startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});document.addEventListener('touchmove',e=>{if(drag){e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});document.addEventListener('touchend',endDrag);})();

function useTemplate(text){const el=document.getElementById('quick-todo-text');if(el){el.value=text;el.focus();quickAddTodo();}}
function completeTodo(todo){
  todo.done=true;
  let earned=todo.reward;
  if(state.focusWeekActive)earned*=state.focusWeekMultiplier;
  const oldCoins=state.coins||0;
  state.coins=oldCoins+earned;
  state.todayEarned=(state.todayEarned||0)+earned;
  state.totalEarned=(state.totalEarned||0)+earned;
  addHistory("plus",earned,todo.text+"完了");

troke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> 集中強化中</span>':'')+'</div></div>'+'<div class="card"><div class="card-title"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:-2px;margin-right:4px;" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>設定</div><div class="setting-row"><div><div style="font-size:14px;">集中強化ウィーク</div><div style="font-size:11px;color:var(--muted);">コイン&times;'+state.focusWeekMultiplier+'倍</div></div><label class="toggle"><input type="checkbox" id="toggle-week" '+(state.focusWeekActive?'checked':'')+'/><span class="toggle-slider"></span></label></div><div class="setting-row"><div><div style="font-size:14px;">ニックネーム変更</div></div><button class="btn btn-outline" style="font-size:12px;padding:5px 10px;" onclick="changeName()">変更</button></div><div class="setting-row"><div><div style="font-size:14px;">残り5分通知</div><div style="font-size:11px;color:var(--muted);">娯楽の残り5分で通知</div></div><button class="btn btn-outline" style="font-size:12px;padding:5px 10px;" onclick="requestNotifPermission()">'+(np==='granted'?'✅ 許可済み':np==='denied'?'❌ 拒否済み':'許可する')+'</button></div><div class="setting-row"><div><div style="font-size:14px;">ダークモード</div><div style="font-size:11px;color:var(--muted);">画面の明暗を切り替え</div></div><label class="toggle"><input type="checkbox" id="toggle-theme" '+(state.theme!=='light'?'checked':'')+'/><span class="toggle-slider"></span></label></div></div>'+'<div class="card" style="margin-top:14px;"><div class="card-title"><svg viewBox="0 0 24 24" width="14" height="14" style="vertical-align:-2px;margin-right:4px;" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>コイン履歴(全件)</div>'+hist+'</div></div>';}
function bindProfile(){const tw=document.getElementById('toggle-week');if(tw)tw.addEventListener('change',()=>{state.focusWeekActive=tw.checked;showToast(tw.checked?'🔥 集中強化ウィーク参加！':'集中強化ウィーク 離脱');scheduleSave();});const tt=document.getElementById('toggle-theme');if(tt)tt.addEventListener('change',()=>{state.theme=tt.checked?'dark':'light';applyTheme();showToast(tt.checked?'🌙 ダークモードに変更':'☀️ ライトモードに変更');scheduleSave();});}
function changeName(){const n=prompt('新しいニックネーム:',state.displayName||'');if(n&&n.trim()){state.displayName=n.trim();document.getElementById('user-name-disp').textContent=state.displayName;showToast('✅ 「'+state.displayName+'」に変更');scheduleSave();renderPage();}}

async function generateMilestones(todoId){const todo=state.todos.find(t=>t.id===todoId);if(!todo)return;const btn=document.querySelector('.todo-ai-btn[data-id="'+todoId+'"]');if(btn){btn.textContent='⏳';btn.disabled=true;}const result=await callGemini('以下のタスクを3～5個の具体的なサブタスクに細分化してください。\nタスク: "'+todo.text+'"\n元のコイン報酬は合計'+todo.reward+'コインです。各サブタスクの難易度に応じて相対的な重みを数値で表してください(合計は自由)。\nJSON形式のみで回答: {"subtasks": [{"text": "サブタスク名", "coins": 数値}, ...]}');if(btn){btn.innerHTML='<svg viewBox="0 0 24 24"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>';btn.disabled=false;}if(!result||!result.subtasks||!result.subtasks.length){showToast('❌ AIの応答が取得できませんでした');return;}
// 元のコインを比率に応じてサブタスクに分配（合計が必ず元のrewardと同じになる）
const budget=todo.reward;const rawWeights=result.subtasks.map(s=>Math.max(1,parseInt(s.coins)||1));const rawTotal=rawWeights.reduce((a,b)=>a+b,0);let dist=rawWeights.map(w=>Math.max(1,Math.floor(w/rawTotal*budget)));const diff=budget-dist.reduce((a,b)=>a+b,0);dist[0]+=diff;// 端数を先頭に加算
pendingMilestoneTodoId=todoId;document.getElementById('milestone-parent-name').textContent='「'+todo.text+'」 → 合計 '+budget+'🪙 を分配';document.getElementById('milestone-list').innerHTML=result.subtasks.map((s,i)=>'<div class="milestone-item"><input type="checkbox" id="ms'+i+'" data-text="'+escHtml(s.text)+'" data-coins="'+dist[i]+'" checked/><label for="ms'+i+'" style="flex:1;font-size:13px;cursor:pointer;">'+escHtml(s.text)+'</label><span class="milestone-coins">+'+dist[i]+'🪙</span></div>').join('');openModal('milestone-modal');}
function applyMilestones(){const selected=[...document.querySelectorAll('#milestone-list input:checked')];if(!selected.length){showToast('❌ サブタスクを1つ以上選択してください');return;}state.todos=state.todos.filter(t=>t.id!==pendingMilestoneTodoId);selected.forEach(cb=>{state.todos.push({id:state.nextId++,text:cb.dataset.text,reward:parseInt(cb.dataset.coins)||20,done:false});});closeModal('milestone-modal');showToast('✅ '+selected.length+'個のサブタスクに細分化しました！');scheduleSave();renderPage();}
function addHistory(type,amount,desc){if(!state.history)state.history=[];const now=new Date(),t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');state.history.push({type,amount,desc,time:t});if(state.history.length>100)state.history=state.history.slice(-100);}
function openModal(id){document.getElementById(id).classList.add('open');const bar=document.getElementById('itut-bar');if(bar)bar.style.display='none';}
function closeModal(id){document.getElementById(id).classList.remove('open');renderITutBar();}
document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});
let toastTimer,toastShownAt=0;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastShownAt=Date.now();toastTimer=setTimeout(()=>t.classList.remove('show'),4000);}
function dismissToastNow(){const t=document.getElementById('toast');if(t){clearTimeout(toastTimer);t.classList.remove('show');}}
function _dismissToast(){if(Date.now()-toastShownAt>300)dismissToastNow();}
document.addEventListener('touchstart',_dismissToast,{capture:true,passive:true});
document.addEventListener('click',_dismissToast,true);
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
setInterval(updateClock,30000);
</script>
