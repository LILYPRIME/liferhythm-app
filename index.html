<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LifeRhythm — AI自律支援</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f4f4f5;--card:#ffffff;--card2:#e8e8e8;--accent:#18181b;--accent2:#52525b;--gold:#f59e0b;--red:#ef4444;--green:#10b981;--text:#18181b;--muted:#71717a;--border:#d4d4d8;}
:root.dark{--bg:#111111;--card:#1c1c1e;--card2:#2c2c2e;--accent:#d4d4d8;--accent2:#a1a1aa;--text:#f5f5f5;--muted:#a1a1aa;--border:#3f3f46;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Hiragino Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
button{cursor:pointer;border:none;font-family:inherit;}
input{font-family:inherit;}
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e8e8e8 0%,#f4f4f5 100%);padding:20px;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 32px;width:100%;max-width:380px;}
.auth-logo{font-size:32px;font-weight:900;color:var(--text);margin-bottom:4px;}
.auth-tagline{font-size:13px;color:var(--muted);margin-bottom:28px;}
.auth-tabs{display:flex;background:var(--card2);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:8px;border-radius:9px;background:none;color:var(--muted);font-size:13px;font-weight:600;transition:all .2s;}
.auth-tab.active{background:var(--accent);color:#fff;}
:root.dark .auth-tab.active{background:var(--accent);color:var(--bg);}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.auth-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;transition:border .2s;}
.auth-input:focus{outline:none;border-color:var(--accent);}
.auth-submit{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:700;background:#18181b;color:#fff;margin-top:6px;}
:root.dark .auth-submit{background:#3f3f46;}
.auth-error{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px;}
.auth-name-field{display:none;}
.auth-name-field.show{display:block;}
.auth-job-field{display:none;}
.auth-job-field.show{display:block;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#main-app{display:none;flex-direction:column;min-height:100vh;}
#view{flex:1;padding-bottom:80px;}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;height:64px;z-index:100;}
:root.dark nav{background:var(--card2);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;color:var(--muted);padding:8px 0;font-size:10px;transition:color .2s;}
.nav-btn.active{color:var(--text);font-weight:700;}
.nav-btn .nav-icon{font-size:22px;}
.page-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
:root.dark .page-header{background:var(--card2);}
.logo{font-size:17px;font-weight:800;color:var(--text);}
.logo-sub{font-size:10px;color:var(--muted);}
.header-right{display:flex;align-items:center;gap:10px;}
.clock-box{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:5px 12px;text-align:center;}
.clock-time{font-size:17px;font-weight:700;letter-spacing:2px;}
.clock-date{font-size:10px;color:var(--muted);}
.user-chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:12px;display:flex;align-items:center;gap:6px;}
.logout-btn{background:none;color:var(--muted);font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);}
.logout-btn:hover{color:var(--red);border-color:var(--red);}
#mode-banner{padding:9px 18px;font-size:12px;font-weight:600;text-align:center;transition:all .5s;}
.mode-focus{background:var(--card2);border-bottom:2px solid var(--muted);color:var(--text);}
.mode-free{background:linear-gradient(90deg,#065f4622,#064e3b99);border-bottom:2px solid #10b981;color:var(--green);}
.container{max-width:680px;margin:0 auto;padding:18px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;}
.card+.card{margin-top:14px;}
.card-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.btn{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;transition:transform .1s,opacity .15s;border:none;}
.btn:hover{transform:scale(1.03);}
.btn-primary{background:#18181b;color:#fff;}
:root.dark .btn-primary{background:#3f3f46;color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.progress-wrap{background:var(--card2);border-radius:999px;height:7px;overflow:hidden;}
.progress-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#3f3f46,#71717a);transition:width .5s ease;}
.coin-strip{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:14px;}
:root.dark .coin-strip{background:var(--card2);}
.coin-orb{width:54px;height:54px;flex-shrink:0;background:radial-gradient(circle at 35% 35%,#fde68a,#f59e0b,#b45309);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 18px #f59e0b44;}
.coin-val{font-size:36px;font-weight:900;background:linear-gradient(90deg,#fde68a,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.coin-label{font-size:12px;color:var(--muted);margin-top:2px;}
.coin-today{font-size:11px;color:var(--green);margin-top:4px;}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.todo-item:last-child{border-bottom:none;}
.todo-item.done{opacity:.5;}
.todo-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;cursor:pointer;transition:all .2s;}
.todo-item.done .todo-check{background:var(--green);border-color:var(--green);color:#fff;}
.todo-text{flex:1;font-size:14px;line-height:1.3;}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
.todo-reward{font-size:11px;font-weight:700;color:var(--gold);background:#f59e0b15;padding:3px 7px;border-radius:20px;border:1px solid #f59e0b33;white-space:nowrap;}
.todo-del{width:26px;height:26px;border-radius:6px;background:none;color:#71717a;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.todo-del:hover{background:#ef444420;color:var(--red);}
.todo-empty{text-align:center;padding:24px 0;color:var(--muted);font-size:13px;}
.add-todo-row{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.add-todo-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;}
.add-todo-input:focus{outline:none;border-color:var(--accent);}
.add-todo-btn{padding:9px 14px;border-radius:10px;background:var(--text);color:var(--bg);font-size:13px;font-weight:700;white-space:nowrap;}
.ent-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border);}
.ent-item:last-child{border-bottom:none;}
.ent-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ent-name{font-size:14px;font-weight:600;}
.ent-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.ent-price-area{text-align:right;flex-shrink:0;}
.ent-price{font-size:17px;font-weight:800;}
.ent-price-orig{font-size:10px;color:var(--muted);}
.price-surge{color:var(--red);}.price-sale{color:var(--green);}
.price-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:2px;}
.tag-surge{background:#ef444420;color:var(--red);border:1px solid #ef444440;}
.tag-sale{background:#10b98120;color:var(--green);border:1px solid #10b98140;}
.locked-url-btn{display:inline-flex;align-items:center;gap:4px;margin-top:5px;font-size:10px;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;cursor:pointer;}
.locked-url-btn:hover{opacity:.8;}
.buy-btn-locked{margin-top:5px;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;border:none;transition:transform .1s;}
.buy-btn-locked:hover{transform:scale(1.05);}
.buy-btn-locked.surge{background:var(--red);color:#fff;}
.buy-btn-locked.sale{background:var(--green);color:#fff;}
.access-timer{font-size:20px;font-weight:800;color:var(--green);letter-spacing:1px;}
.access-timer-label{font-size:10px;color:var(--muted);margin-top:1px;}
.open-btn{display:block;margin-top:6px;padding:6px 14px;border-radius:8px;background:var(--green);color:#fff;font-size:12px;font-weight:700;border:none;width:100%;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center;}
.stat-val{font-size:24px;font-weight:800;}
.stat-label{font-size:11px;color:var(--muted);margin-top:3px;}
.rank-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center;}
:root.dark .rank-card{background:var(--card2);border-color:var(--border);}
.rank-badge-big{font-size:52px;margin-bottom:6px;}
.rank-name-big{font-size:22px;font-weight:800;}
.profile-hero{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;}
:root.dark .profile-hero{background:var(--card2);border-color:var(--border);}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:999px;cursor:pointer;transition:.3s;}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:var(--accent);}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);}
.week-card{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid #f59e0b44;border-radius:16px;padding:14px;}
:root.dark .week-card{background:var(--card2);}
.week-active-tag{background:#f59e0b;color:#000;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:8px;}
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:500px;transform:translateY(40px);transition:transform .3s;max-height:80vh;overflow-y:auto;}

.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.modal-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-size:14px;margin-bottom:10px;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.num-input{width:90px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:14px;text-align:center;}
.num-input:focus{outline:none;border-color:var(--accent);}
.history-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.history-item:last-child{border-bottom:none;}
.history-sign{font-size:16px;font-weight:800;}
.history-sign.plus{color:var(--green);}
.history-sign.minus{color:var(--red);}
.history-desc{flex:1;font-size:13px;}
.history-time{font-size:11px;color:var(--muted);}
#toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:500;pointer-events:auto;max-width:calc(100% - 32px);text-align:center;white-space:normal;word-break:break-word;user-select:text;cursor:text;}
#toast.show{transform:translateX(-50%) translateY(0);}
#notif-banner{display:none;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin:10px 18px 0;font-size:12px;align-items:center;gap:10px;}
#notif-banner.show{display:flex;}
.goal-banner{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:14px;font-size:13px;gap:8px;}
.goal-banner.can-unlock{background:var(--card2);border-color:var(--border);cursor:pointer;}
.goal-banner-label{color:var(--muted);font-size:11px;margin-bottom:2px;}
.goal-banner-val{font-size:15px;font-weight:800;}
.goal-banner-btn{background:var(--text);color:var(--bg);border:none;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.template-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0 4px;border-top:1px solid var(--border);margin-top:8px;}
.template-chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;font-size:11px;padding:4px 10px;color:var(--muted);cursor:pointer;transition:background .15s;white-space:nowrap;}
.template-chip:hover{background:var(--border);color:var(--text);}
.price-next{font-size:11px;color:var(--muted);text-align:center;padding:10px 0 0;border-top:1px solid var(--border);margin-top:10px;}
.todo-ai-btn{background:var(--card2);border:1px solid var(--border);border-radius:6px;font-size:12px;padding:2px 8px;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:background .15s;}
.todo-ai-btn:hover{background:var(--border);}.todo-ai-btn:disabled{opacity:0.5;cursor:not-allowed;}
.milestone-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;background:var(--card2);margin-bottom:8px;}
.milestone-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;}.milestone-coins{font-size:12px;color:var(--gold);font-weight:700;white-space:nowrap;}
.add-todo-reward-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.guest-btn{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--card2);color:var(--fg);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s;}
.guest-btn:hover{background:var(--border);}
.guest-form{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:12px;display:none;}
.guest-select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:14px;}
.guest-badge{background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:20px;margin-left:6px;vertical-align:middle;}
.tutorial-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:none;align-items:center;justify-content:center;}
.tutorial-overlay.show{display:flex;}
.tutorial-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 28px;max-width:340px;width:90%;text-align:center;}
.tutorial-emoji{font-size:64px;margin-bottom:16px;}
.tutorial-title{font-size:20px;font-weight:800;margin-bottom:10px;}
.tutorial-desc{font-size:14px;color:var(--muted);line-height:1.75;margin-bottom:24px;}
.tutorial-dots{display:flex;gap:7px;justify-content:center;margin-bottom:22px;}
.tutorial-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s;}
.tutorial-dot.active{background:var(--accent);}
.itut-bar{position:fixed;bottom:70px;left:0;right:0;z-index:200;padding:0 12px;}
.itut-inner{background:#fff;border-radius:16px;padding:16px;color:#27272a;box-shadow:0 4px 16px #00000015;border:1px solid var(--border);}
.itut-step-label{font-size:11px;color:#71717a;margin-bottom:3px;}
.itut-title{font-size:15px;font-weight:800;margin-bottom:7px;color:#18181b;}
.itut-hint{font-size:13px;color:#3f3f46;line-height:1.6;margin-bottom:8px;}
.itut-ex{background:#f1f5f9;border-radius:8px;padding:7px 11px;font-size:12px;margin-bottom:10px;cursor:pointer;border:1px solid #e2e8f0;color:#27272a;width:100%;text-align:left;line-height:1.5;}
.itut-ex:hover{background:#e2e8f0;}
.itut-skip{background:none;border:1px solid #cbd5e1;color:#71717a;padding:5px 14px;border-radius:8px;font-size:12px;cursor:pointer;}
.tut-again-btn{display:none;}
.tut-start-btn{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:700;background:#18181b;color:#fff;box-shadow:0 4px 18px #00000020;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;}
.tut-start-btn:hover{opacity:.9;}
:root.dark .tut-start-btn{background:#3f3f46;}
</style>
</head>
<body>
<div id="loading"><div style="font-size:28px;">&#9889;</div><div class="spin"></div><div style="font-size:13px;color:var(--muted);">&#35501;&#12415;&#36796;&#12415;&#20013;...</div></div>
<div id="auth-screen" style="display:none;">
  <div class="auth-box">
    <div class="auth-logo">&#9889; LifeRhythm</div>
    <div class="auth-tagline">SNSは「ご褒美」。タスクをこなしてコインを稼ぎ、好きな時間にSNSを楽しもう</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">&#12525;&#12464;&#12452;&#12531;</button>
      <button class="auth-tab" onclick="switchTab('signup')">&#26032;&#35215;&#30331;&#37682;</button>
    </div>
    <div class="auth-name-field" id="name-field">
      <div class="auth-field"><label>&#12491;&#12483;&#12463;&#12493;&#12540;&#12512;</label><input class="auth-input" id="auth-name" type="text" placeholder="&#20363;: &#12373;&#12367;&#12425;"/></div>
    </div>
    <div class="auth-job-field" id="job-field">
      <div class="auth-field"><label>&#32887;&#26989;</label>
        <select class="guest-select" id="auth-job">
          <option value="&#39640;&#26657;&#29983;">&#39640;&#26657;&#29983;</option>
          <option value="&#22823;&#23398;&#29983;">&#22823;&#23398;&#29983;</option>
          <option value="&#31038;&#20250;&#20154;">&#31038;&#20250;&#20154;</option>
          <option value="&#12381;&#12398;&#20182;">&#12381;&#12398;&#20182;</option>
        </select>
      </div>
    </div>
    <div class="auth-field"><label>&#12513;&#12540;&#12523;&#12450;&#12489;&#12524;&#12473;</label><input class="auth-input" id="auth-email" type="email" placeholder="you@example.com"/></div>
    <div class="auth-field"><label>&#12497;&#12473;&#12527;&#12540;&#12489;&#65288;6&#25991;&#23383;&#20197;&#19978;&#65289;</label><input class="auth-input" id="auth-pass" type="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;"/></div>
    <button class="auth-submit" id="auth-btn" onclick="doAuth()">&#12525;&#12464;&#12452;&#12531;</button>

async function loadUserData(user){const ref=db.collection('users').doc(user.uid),snap=await ref.get(),name=user.displayName||'ユーザー';if(snap.exists){state=snap.data();if(!state.access)state.access={};if(!state.todos)state.todos=[];if(!state.theme)state.theme='light';if(state.lastDate!==today()){state.todayEarned=0;state.lastDate=today();state.todos.forEach(t=>t.done=false);await saveNow();}}else{state=defaultState(name);state.job=pendingSignupJob;await saveNow();}document.getElementById('user-name-disp').textContent=state.displayName;}

function pageHome(){
  const todos=state.todos||[],done=todos.filter(t=>t.done).length,total=todos.length,pct=total?Math.round(done/total*100):0;
  const todoRows=todos.length===0?'<div class="todo-empty">タスクがありません<br><span style="font-size:12px;">下の入力欄から追加してください</span></div>':todos.map(t=>'<div class="todo-item'+(t.done?' done':'')+'" data-id="'+t.id+'"><div class="todo-check todo-check-btn" data-id="'+t.id+'">'+(t.done?'✓':'')+'</div><div class="todo-text">'+escHtml(t.text)+'</div><div class="todo-reward">+'+t.reward+(state.focusWeekActive?'<span style="color:#f59e0b;">&times;'+state.focusWeekMultiplier+'</span>':'')+'🪙</div>'+(t.done?'':'<button class="todo-ai-btn" data-id="'+t.id+'">🤖</button>')+'<button class="todo-del" data-id="'+t.id+'">&times;</button></div>').join('');

  const mode=currentMode(),mult=getMultiplier(mode);

  const nearest=locked[0];

  const TEMPLATES=[{e:'📬',t:'メール返信'},{e:'🗂',t:'デスク整理'},{e:'🤸',t:'ストレッチ'},{e:'📚',t:'読書：10分'},{e:'📝',t:'メモ整理'},{e:'👍',t:'タスク確認'}];
  const templateChips=TEMPLATES.map(t=>'<button class="template-chip" data-tmpl="'+t.t+'">'+t.e+' '+t.t+'</button>').join('');
  return '<div class="container">'

    +'<button class="tut-start-btn" id="tut-again-btn">📖 チュートリアルを始める</button>'

    +'<div class="template-row">'+templateChips+'</div>'
    +(total>0?'<div style="margin-top:12px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;"><span>進捗</span><span>'+done+'/'+total+' 完了</span></div><div class="progress-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div>'+(done===total&&total>0?'<div style="font-size:11px;color:var(--gold);margin-top:5px;font-weight:700;">🎉 全タスク完了！</div>':'<div style="font-size:11px;color:var(--muted);margin-top:5px;">全タスク完了でボーナス +50 🪙</div>')+'</div>':'')+'</div>'
    +(state.focusWeekActive?'<div class="week-card" style="margin-top:14px;"><div class="week-active-tag">🔥 集中強化ウィーク 開催中！</div><div style="font-size:13px;">獲得コインが <b style="color:var(--gold)">&times;'+state.focusWeekMultiplier+' 倍</b>！</div><div style="font-size:26px;font-weight:800;color:var(--gold);margin:6px 0;">残り '+state.focusWeekDaysLeft+' 日</div></div>':'')
    +'<div class="card" style="margin-top:14px;"><div class="card-title">📜 コイン履歴</div>'+hist+'</div></div>';
}
function bindHome(){document.querySelectorAll('.todo-check-btn').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();const todo=state.todos.find(t=>t.id===parseInt(btn.dataset.id));if(todo&&!todo.done)completeTodo(todo);});});document.querySelectorAll('.todo-del').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();state.todos=state.todos.filter(t=>t.id!==parseInt(btn.dataset.id));showToast('🗑️ タスクを削除しました');scheduleSave();renderPage();});});document.querySelectorAll('.todo-ai-btn').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();generateMilestones(parseInt(btn.dataset.id));});});const inp=document.getElementById('quick-todo-text');if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')quickAddTodo();});const gb=document.getElementById('goal-banner-unlock');if(gb)gb.addEventListener('click',()=>goto('shop'));document.querySelectorAll('.template-chip').forEach(b=>b.addEventListener('click',()=>useTemplate(b.dataset.tmpl)));const tab=document.getElementById('tut-again-btn');if(tab)tab.addEventListener('click',startInteractiveTutorial);}
function useTemplate(text){const el=document.getElementById('quick-todo-text');if(el){el.value=text;el.focus();quickAddTodo();}}
function completeTodo(todo){todo.done=true;let earned=todo.reward;if(state.focusWeekActive)earned*=state.focusWeekMultiplier;const oldCoins=state.coins||0;state.coins=oldCoins+earned;state.todayEarned=(state.todayEarned||0)+earned;state.totalEarned=(state.totalEarned||0)+earned;addHistory('plus',earned,todo.text+'—達成');showToast('✅ +'+earned+'🪙 獲得！');const m=currentMode(),ml=getMultiplier(m);const newlyUnlockable=ENTERTAINMENTS.find(e=>!isAccessActive(e.id)&&oldCoins<Math.round(e.basePrice*ml)&&state.coins>=Math.round(e.basePrice*ml));if(newlyUnlockable)setTimeout(()=>showToast('🎉 '+newlyUnlockable.name+'が解除できます！ショップへ →'),1200);if(state.todos.every(t=>t.done)&&state.todos.length>0){setTimeout(()=>{state.coins+=50;state.todayEarned+=50;state.totalEarned+=50;addHistory('plus',50,'全タスク完了ボーナス');showToast('🎉 全タスク完了ボーナス +50🪙！');scheduleSave();renderPage();},600);}scheduleSave();renderPage();checkITutProgress();}
async function quickAddTodo(){const tEl=document.getElementById('quick-todo-text'),rEl=document.getElementById('quick-todo-reward'),addBtn=document.getElementById('quick-add-btn');if(!tEl)return;const text=tEl.value.trim();if(!text){showToast('❌ タスク名を入力してください');return;}let reward=parseInt(rEl.value);if(!reward||isNaN(reward)){if(addBtn){addBtn.textContent='⏳ AI設定中...';addBtn.disabled=true;}const result=await callGemini('以下のタスクに適切な報酬コインを提案してください。\nタスク名: "'+text+'"\n所要時間を推定してコインを決定。目安: 1～5分=10, 5～15分=20, 15～30分=50, 30～60分=100, 60分以上=150\nJSON形式のみで回答: {"coins": 数値(10～200), "minutes": 推定分数}');if(addBtn){addBtn.textContent='追加';addBtn.disabled=false;}reward=result?.coins||20;if(result)showToast('🤖 AI提案: '+reward+'🪙 (推定'+result.minutes+'分)');}state.todos.push({id:state.nextId++,text,reward,done:false});tEl.value='';rEl.value='';scheduleSave();renderPage();checkITutProgress();setTimeout(()=>{const el=document.getElementById('quick-todo-text');if(el)el.focus();},50);}
const ENTERTAINMENTS=[{id:'yt',icon:'📺',name:'YouTube',bg:'#ff000022',br:'#ff000044',basePrice:30,desc:'動画視聴',duration:30,url:'https://youtube.com'},{id:'tt',icon:'🎵',name:'TikTok',bg:'#ffffff11',br:'#ffffff22',basePrice:20,desc:'ショート動画',duration:15,url:'https://tiktok.com'},{id:'tw',icon:'🐦',name:'X',bg:'#1d9bf022',br:'#1d9bf044',basePrice:15,desc:'タイムライン',duration:15,url:'https://x.com'},{id:'ig',icon:'📸',name:'Instagram',bg:'#e1306c22',br:'#e1306c44',basePrice:15,desc:'フィード',duration:15,url:'https://instagram.com'},{id:'nt',icon:'🎬',name:'Netflix',bg:'#e5000022',br:'#e5000044',basePrice:50,desc:'動画視聴',duration:60,url:'https://netflix.com'},{id:'gm',icon:'🎮',name:'ゲーム',bg:'#18181b22',br:'#18181b44',basePrice:40,desc:'ゲームプレイ',duration:30,url:''}];
function isAccessActive(id){const u=state.access&&state.access[id];return u&&u>Date.now();}
function remainingSec(id){const u=state.access&&state.access[id];if(!u)return 0;return Math.max(0,Math.ceil((u-Date.now())/1000));}
function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function nextModeChangeMin(){const now=new Date(),h=now.getHours(),m=now.getMinutes();const bs=[6,12,14,18,22];const next=bs.find(b=>b>h)||(bs[0]+24);return(next-h)*60-m;}
function pageShop(){const mode=currentMode(),mult=getMultiplier(mode),isSurge=mode==='focus';const minLeft=nextModeChangeMin(),tlH=Math.floor(minLeft/60),tlM=minLeft%60;const timeLeft=(tlH>0?tlH+'時間':'')+tlM+'分';const nextModeLabel=isSurge?'集中タイム → 自由タイム':'自由タイム → 集中タイム';const rows=ENTERTAINMENTS.map(e=>{const price=Math.round(e.basePrice*mult),active=isAccessActive(e.id),sec=remainingSec(e.id);if(active)return'<div class="ent-item"><div class="ent-icon" style="background:'+e.bg+';border:2px solid var(--green);">'+e.icon+'</div><div style="flex:1"><div class="ent-name">'+e.name+'</div><div class="ent-desc" style="color:var(--green);">✅ アクセス中</div></div><div class="ent-price-area" style="text-align:center;"><div class="access-timer" id="timer-'+e.id+'">'+fmtTime(sec)+'</div><div class="access-timer-label">残り時間</div>'+(e.url?'<button class="open-btn" data-url="'+e.url+'">▶ 開く</button>':'<div style="font-size:11px;color:var(--muted);margin-top:6px;">デバイスで開く</div>')+'</div></div>';const ul=e.url?e.url.replace('https://',''):'';return'<div class="ent-item"><div class="ent-icon" style="background:'+e.bg+';border:1px solid '+e.br+';filter:grayscale(60%);">🔒</div><div style="flex:1"><div class="ent-name" style="color:var(--muted);">'+e.name+'</div><div class="ent-desc">'+e.desc+'('+e.duration+'分)</div>'+(ul?'<div class="locked-url-btn" data-id="'+e.id+'">🔗 '+ul+'</div>':'')+'</div><div class="ent-price-area"><div class="ent-price '+(isSurge?'price-surge':'price-sale')+'">'+price+'🪙</div><div class="ent-price-orig">通常 '+e.basePrice+'🪙</div><div class="price-tag '+(isSurge?'tag-surge':'tag-sale')+'">'+(isSurge?'🔴 高騰中':'🟢 セール')+'</div><br><button class="buy-btn-locked '+(isSurge?'surge':'sale')+'" data-id="'+e.id+'" data-price="'+price+'" data-name="'+e.name+'" data-duration="'+e.duration+'">解除する</button></div></div>';}).join('');return'<div class="container"><div class="card"><div class="card-title">🎮 娯楽アクセス権 <span style="margin-left:auto;font-size:11px;color:var(--muted);">残高: <b style="color:var(--gold)">'+state.coins+'🪙</b></span></div>'+rows+'</div><div class="card" style="margin-top:14px;"><div class="card-title">ℹ️ 価格変動のしくみ</div><div style="font-size:12px;color:var(--muted);line-height:1.8;">・ <b style="color:var(--muted)">集中タイム</b>(午前・午後) &rarr; &times;5<br>・ <b style="color:var(--green)">自由タイム</b>(昼・夜) &rarr; &times;0.5</div>'+'<div class="price-next">⏱ 次の価格変更まで <b>'+timeLeft+'</b> ('+nextModeLabel+')</div></div></div>';}
function bindShop(){document.querySelectorAll('.locked-url-btn').forEach(b=>{b.addEventListener('click',()=>{const name=ENTERTAINMENTS.find(e=>e.id===b.dataset.id)?.name||'';showToast('🔒 '+name+' はロック中！コインで解除してください');});});document.querySelectorAll('.buy-btn-locked').forEach(b=>{b.addEventListener('click',()=>{const id=b.dataset.id,price=parseInt(b.dataset.price),name=b.dataset.name,dur=parseInt(b.dataset.duration);if((state.coins||0)>=price){state.coins-=price;if(!state.access)state.access={};state.access[id]=Date.now()+dur*60*1000;notified5min.delete(id);addHistory('minus',price,name+'解除('+dur+'分)');showToast('🔓 '+name+' 解除！'+dur+'分アクセス可能');scheduleSave();renderPage();checkITutProgress();}else showToast('❌ コイン不足(必要: '+price+'🪙)');});});document.querySelectorAll('.open-btn').forEach(b=>{b.addEventListener('click',()=>{window.open(b.dataset.url,'_blank');});});}
// v0.5: 残り5分通知システム
let accessTimerInterval=null;
function startAccessTimer(){if(accessTimerInterval)clearInterval(accessTimerInterval);accessTimerInterval=setInterval(()=>{if(!state||!state.access)return;const now=Date.now();let expired=false;Object.keys(state.access).forEach(id=>{const until=state.access[id];if(!until)return;const sec=Math.max(0,Math.ceil((until-now)/1000));const ent=ENTERTAINMENTS.find(e=>e.id===id),name=ent?.name||id;if(until<=now){state.access[id]=null;notified5min.delete(id);expired=true;showToast('⏰ '+name+' の時間が終了しました');sendNotif('⏰ LifeRhythm',name+' のアクセス時間が終了しました');}else{const el=document.getElementById('timer-'+id);if(el)el.textContent=fmtTime(sec);if(sec<=300&&!notified5min.has(id)){notified5min.add(id);showToast('⚠️ '+name+' 残り5分！キリのいいところで終わりにしよう');sendNotif('⚠️ '+name+' 残り5分！','もうすぐ時間が終了します。キリのいいところで終わりに！');}}});if(expired){scheduleSave();if(state.currentPage==='shop')renderPage();}},1000);}
const RANKS=[{name:'Bronze',icon:'🥉',min:0,max:999},{name:'Silver',icon:'🥈',min:1000,max:2999},{name:'Gold',icon:'🥇',min:3000,max:5999},{name:'Platinum',icon:'💎',min:6000,max:9999},{name:'Diamond',icon:'💠',min:10000,max:Infinity}];
function pageRank(){const total=state.totalEarned||0,idx=RANKS.findIndex(r=>total>=r.min&&total<=r.max),rank=RANKS[idx],next=RANKS[idx+1],pct=next?Math.min(100,Math.round((total-rank.min)/(next.min-rank.min)*100)):100;const rl=RANKS.map((r,i)=>{const a=i===idx,p=i<idx;return'<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);opacity:'+(p||a?1:.4)+';"><span style="font-size:22px;">'+r.icon+'</span><div style="flex:1"><div style="font-size:14px;font-weight:'+(a?700:400)+';">'+r.name+(a?' ← 現在':'')+'</div><div style="font-size:11px;color:var(--muted);">'+r.min.toLocaleString()+' ~ '+(r.max===Infinity?'∞':r.max.toLocaleString())+'</div></div>'+(p?'<span style="color:var(--green);">✓</span>':'')+'</div>';}).join('');return'<div class="container"><div class="rank-card"><div class="rank-badge-big">'+rank.icon+'</div><div class="rank-name-big">'+rank.name+'</div><div style="font-size:12px;color:var(--muted);">全期間 '+total.toLocaleString()+' コイン獲得</div>'+(next?'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin:12px 0 4px;"><span>'+total.toLocaleString()+'</span><span>次: '+next.name+'('+next.min.toLocaleString()+')</span></div><div class="progress-wrap"><div class="progress-bar" style="width:'+pct+'%;"></div></div><div style="font-size:11px;color:var(--muted);margin-top:5px;">あと'+(next.min-total).toLocaleString()+'コインで昇格！</div>':'<div style="font-size:13px;color:var(--gold);margin-top:10px;">🏆 最高ランク達成！</div>')+'</div><div class="card" style="margin-top:14px;"><div class="card-title">📊 統計</div><div class="stats-grid"><div class="stat-box"><div class="stat-val" style="color:var(--muted);">'+total.toLocaleString()+'</div><div class="stat-label">全期間獲得</div></div><div class="stat-box"><div class="stat-val" style="color:var(--accent2);">'+(state.todayEarned||0)+'</div><div class="stat-label">本日獲得</div></div><div class="stat-box"><div class="stat-val" style="color:#f59e0b;">🔥 '+(state.streak||0)+'</div><div class="stat-label">連続日数</div></div><div class="stat-box"><div class="stat-val" style="color:#10b981;">'+(state.coins||0)+'</div><div class="stat-label">現在の残高</div></div></div></div><div class="card" style="margin-top:14px;"><div class="card-title">🏅 ランク一覧</div>'+rl+'</div></div>';}
function pageProfile(){const rank=RANKS.find(r=>(state.totalEarned||0)>=r.min&&(state.totalEarned||0)<=r.max);const hist=(state.history||[]).slice().reverse().map(h=>'<div class="history-item"><div class="history-sign '+h.type+'">'+(h.type==='plus'?'+':'-')+h.amount+'</div><div class="history-desc">'+h.desc+'</div><div class="history-time">'+h.time+'</div></div>').join('')||'<div style="font-size:13px;color:var(--muted);">まだ履歴なし</div>';const np=typeof Notification!=='undefined'?Notification.permission:'unsupported';return'<div class="container"><div class="profile-hero"><div style="font-size:52px;margin-bottom:8px;">😎</div><div style="font-size:20px;font-weight:800;">'+(state.displayName||'ユーザー')+'</div><div style="font-size:12px;color:var(--muted);margin-top:4px;">'+(currentUser?.email||'')+'</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;"><span style="background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;">'+rank.icon+' '+rank.name+'</span><span style="background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;">🔥 '+(state.streak||0)+'日連続</span>'+(state.focusWeekActive?'<span style="background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;">⚡ 集中強化中</span>':'')+'</div></div>'+'<div class="card"><div class="card-title">⚙️ 設定</div><div class="setting-row"><div><div style="font-size:14px;">集中強化ウィーク</div><div style="font-size:11px;color:var(--muted);">コイン&times;'+state.focusWeekMultiplier+'倍</div></div><label class="toggle"><input type="checkbox" id="toggle-week" '+(state.focusWeekActive?'checked':'')+'/><span class="toggle-slider"></span></label></div><div class="setting-row"><div><div style="font-size:14px;">ニックネーム変更</div></div><button class="btn btn-outline" style="font-size:12px;padding:5px 10px;" onclick="changeName()">変更</button></div><div class="setting-row"><div><div style="font-size:14px;">残り5分通知</div><div style="font-size:11px;color:var(--muted);">娯楽の残り5分で通知</div></div><button class="btn btn-outline" style="font-size:12px;padding:5px 10px;" onclick="requestNotifPermission()">'+(np==='granted'?'✅ 許可済み':np==='denied'?'🚫 拒否済み':'許可する')+'</button></div><div class="setting-row"><div><div style="font-size:14px;">ダークモード</div><div style="font-size:11px;color:var(--muted);">画面の明暗を切り替え</div></div><label class="toggle"><input type="checkbox" id="toggle-theme" '+(state.theme!=='light'?'checked':'')+'/><span class="toggle-slider"></span></label></div></div>'+'<div class="card" style="margin-top:14px;"><div class="card-title">📜 コイン履歴(全件)</div>'+hist+'</div></div>';}
function bindProfile(){const tw=document.getElementById('toggle-week');if(tw)tw.addEventListener('change',()=>{state.focusWeekActive=tw.checked;showToast(tw.checked?'🔥 集中強化ウィーク参加！':'集中強化ウィーク 離脱');scheduleSave();});const tt=document.getElementById('toggle-theme');if(tt)tt.addEventListener('change',()=>{state.theme=tt.checked?'dark':'light';applyTheme();showToast(tt.checked?'🌙 ダークモードに変更':'☀️ ライトモードに変更');scheduleSave();});}
function changeName(){const n=prompt('新しいニックネーム:',state.displayName||'');if(n&&n.trim()){state.displayName=n.trim();document.getElementById('user-name-disp').textContent=state.displayName;showToast('✅ 「'+state.displayName+'」に変更');scheduleSave();renderPage();}}

async function generateMilestones(todoId){const todo=state.todos.find(t=>t.id===todoId);if(!todo)return;const btn=document.querySelector('.todo-ai-btn[data-id="'+todoId+'"]');if(btn){btn.textContent='⏳';btn.disabled=true;}const result=await callGemini('以下のタスクを3～5個の具体的なサブタスクに細分化してください。\nタスク: "'+todo.text+'"\n元のコイン報酬は合計'+todo.reward+'コインです。各サブタスクの難易度に応じて相対的な重みを数値で表してください(合計は自由)。\nJSON形式のみで回答: {"subtasks": [{"text": "サブタスク名", "coins": 数値}, ...]}');if(btn){btn.textContent='🤖';btn.disabled=false;}if(!result||!result.subtasks||!result.subtasks.length){showToast('❌ AIの応答が取得できませんでした');return;}
// 元のコインを比率に応じてサブタスクに分配（合計が必ず元のrewardと同じになる）
const budget=todo.reward;const rawWeights=result.subtasks.map(s=>Math.max(1,parseInt(s.coins)||1));const rawTotal=rawWeights.reduce((a,b)=>a+b,0);let dist=rawWeights.map(w=>Math.max(1,Math.floor(w/rawTotal*budget)));const diff=budget-dist.reduce((a,b)=>a+b,0);dist[0]+=diff;// 端数を先頭に加算
pendingMilestoneTodoId=todoId;document.getElementById('milestone-parent-name').textContent='「'+todo.text+'」 → 合計 '+budget+'🪙 を分配';document.getElementById('milestone-list').innerHTML=result.subtasks.map((s,i)=>'<div class="milestone-item"><input type="checkbox" id="ms'+i+'" data-text="'+escHtml(s.text)+'" data-coins="'+dist[i]+'" checked/><label for="ms'+i+'" style="flex:1;font-size:13px;cursor:pointer;">'+escHtml(s.text)+'</label><span class="milestone-coins">+'+dist[i]+'🪙</span></div>').join('');openModal('milestone-modal');}
function applyMilestones(){const selected=[...document.querySelectorAll('#milestone-list input:checked')];if(!selected.length){showToast('❌ サブタスクを1つ以上選択してください');return;}state.todos=state.todos.filter(t=>t.id!==pendingMilestoneTodoId);selected.forEach(cb=>{state.todos.push({id:state.nextId++,text:cb.dataset.text,reward:parseInt(cb.dataset.coins)||20,done:false});});closeModal('milestone-modal');showToast('✅ '+selected.length+'個のサブタスクに細分化しました！');scheduleSave();renderPage();}
function addHistory(type,amount,desc){if(!state.history)state.history=[];const now=new Date(),t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');state.history.push({type,amount,desc,time:t});if(state.history.length>100)state.history=state.history.slice(-100);}
function openModal(id){document.getElementById(id).classList.add('open');const bar=document.getElementById('itut-bar');if(bar)bar.style.display='none';}
function closeModal(id){document.getElementById(id).classList.remove('open');renderITutBar();}
document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});
let toastTimer,toastShownAt=0;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastShownAt=Date.now();toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}
document.addEventListener('click',()=>{const t=document.getElementById('toast');if(t&&t.classList.contains('show')&&Date.now()-toastShownAt>300){clearTimeout(toastTimer);t.classList.remove('show');}},true);
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
setInterval(updateClock,30000);
