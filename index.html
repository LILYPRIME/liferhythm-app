const notified5min=new Set();
function showNotifBanner(){if(typeof Notification!=='undefined'&&Notification.permission==='default')document.getElementById('notif-banner').classList.add('show');}
function requestNotifPermission(){if(typeof Notification==='undefined'){showToast('この環境では通知は利用できません');return;}Notification.requestPermission().then(p=>{document.getElementById('notif-banner').classList.remove('show');showToast(p==='granted'?'🔔 通知が許可されました！':'通知が拒否されました');if(state&&state.currentPage==='profile')renderPage();});}
function sendNotif(title,body){if(typeof Notification==='undefined'||Notification.permission!=='granted')return;try{new Notification(title,{body,icon:'https://em-content.zobj.net/source/apple/354/high-voltage_26a1.png'});}catch(e){}}
let authMode='login';
function switchTab(mode){authMode=mode;document.querySelectorAll('.auth-tab').forEach((t,i)=>{t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='signup'));});document.getElementById('auth-btn').textContent=mode==='login'?'ログイン':'アカウント作成';document.getElementById('name-field').classList.toggle('show',mode==='signup');document.getElementById('auth-error').textContent='';}
function doAuth(){const email=document.getElementById('auth-email').value.trim(),pass=document.getElementById('auth-pass').value,name=document.getElementById('auth-name').value.trim()||'ユーザー',errEl=document.getElementById('auth-error');errEl.textContent='';if(!email||!pass){errEl.textContent='メールとパスワードを入力してください';return;}document.getElementById('auth-btn').textContent='処理中...';if(authMode==='login'){auth.signInWithEmailAndPassword(email,pass).catch(e=>{errEl.textContent=authErrMsg(e.code);document.getElementById('auth-btn').textContent='ログイン';});}else{if(pass.length<6){errEl.textContent='パスワードは6文字以上';document.getElementById('auth-btn').textContent='アカウント作成';return;}auth.createUserWithEmailAndPassword(email,pass).then(cred=>cred.user.updateProfile({displayName:name})).catch(e=>{errEl.textContent=authErrMsg(e.code);document.getElementById('auth-btn').textContent='アカウント作成';});}}
function authErrMsg(c){const m={'auth/user-not-found':'メールアドレスが見つかりません','auth/wrong-password':'パスワードが間違っています','auth/email-already-in-use':'このメールはすでに使われています','auth/invalid-email':'メールアドレスの形式が正しくありません','auth/weak-password':'パスワードが短すぎます','auth/invalid-credential':'メールまたはパスワードが間違っています'};return m[c]||'エラー('+c+')';}
function doLogout(){auth.signOut();}
async function loadUserData(user){const ref=db.collection('users').doc(user.uid),snap=await ref.get(),name=user.displayName||'ユーザー';if(snap.exists){state=snap.data();if(!state.access)state.access={};if(!state.combos)state.combos=[];if(!state.todos)state.todos=[];if(state.lastDate!==today()){state.todayEarned=0;state.lastDate=today();state.todos.forEach(t=>t.done=false);await saveNow();}}else{state=defaultState(name);await saveNow();}document.getElementById('user-name-disp').textContent=state.displayName;}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveNow,1000);}
async function saveNow(){if(!currentUser||!state)return;await db.collection('users').doc(currentUser.uid).set(state);}
auth.onAuthStateChanged(async user=>{document.getElementById('loading').style.display='none';if(user){currentUser=user;await loadUserData(user);document.getElementById('auth-screen').style.display='none';document.getElementById('main-app').style.display='flex';updateClock();startAccessTimer();showNotifBanner();goto('home');}else{currentUser=null;state=null;document.getElementById('main-app').style.display='none';document.getElementById('auth-screen').style.display='flex';}});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('auth-screen').style.display!=='none')doAuth();});
function getMode(h){if(h>=6&&h<12)return'focus';if(h>=12&&h<14)return'free';if(h>=14&&h<18)return'focus';if(h>=18&&h<22)return'free';return'focus';}
function getMultiplier(mode){return mode==='focus'?5:0.5;}
function currentMode(){return getMode(new Date().getHours());}
function updateClock(){const now=new Date(),h=String(now.getHours()).padStart(2,'0'),mi=String(now.getMinutes()).padStart(2,'0');document.getElementById('clock').textContent=h+':'+mi;const days=['日','月','火','水','木','金','土'];document.getElementById('clock-date').textContent=(now.getMonth()+1)+'/'+now.getDate()+'('+days[now.getDay()]+')';const mode=currentMode(),banner=document.getElementById('mode-banner');if(mode==='focus'){banner.className='mode-focus';banner.textContent='🔴 集中タイム — 娯楽の価格が高騰中（5倍）';}else{banner.className='mode-free';banner.textContent='🟢 自由タイム — 娯楽がセール価格！🎉';}if(state&&document.getElementById('main-app').style.display!=='none')renderPage();}
function goto(page){state.currentPage=page;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const nb=document.getElementById('nav-'+page);if(nb)nb.classList.add('active');renderPage();}
function renderPage(){if(!state)return;const v=document.getElementById('view'),page=state.currentPage||'home';switch(page){case'home':v.innerHTML=pageHome();bindHome();break;case'shop':v.innerHTML=pageShop();bindShop();break;case'rank':v.innerHTML=pageRank();break;case'profile':v.innerHTML=pageProfile();bindProfile();break;}}
function pageHome(){
  const todos=state.todos||[],done=todos.filter(t=>t.done).length,total=todos.length,pct=total?Math.round(done/total*100):0;
  const todoRows=todos.length===0?'<div class="todo-empty">タスクがありません<br><span style="font-size:12px;">下の入力欄から追加してください</span></div>':todos.map(t=>'<div class="todo-item'+(t.done?' done':'')+'" data-id="'+t.id+'"><div class="todo-check todo-check-btn" data-id="'+t.id+'">'+(t.done?'✓':'')+'</div><div class="todo-text">'+escHtml(t.text)+'</div><div class="todo-reward">+'+t.reward+(state.focusWeekActive?'<span style="color:#f59e0b;">&times;'+state.focusWeekMultiplier+'</span>':'')+'🪙</div><button class="todo-del" data-id="'+t.id+'">&times;</button></div>').join('');
  const combos=state.combos||[];
  const comboSection=combos.length===0?'':'<div class="card" style="margin-top:14px;"><div class="card-title">🔥 コンボボーナス<span style="margin-left:auto;"><button class="btn btn-outline" style="font-size:11px;padding:3px 9px;" onclick="openAddCombo()">+ 追加</button></span></div>'+combos.map(c=>renderComboCard(c)).join('')+'</div>';
  const hist=(state.history||[]).slice(-5).reverse().map(h=>'<div class="history-item"><div class="history-sign '+h.type+'">'+(h.type==='plus'?'+':'-')+h.amount+'</div><div class="history-desc">'+h.desc+'</div><div class="history-time">'+h.time+'</div></div>').join('')||'<div style="font-size:13px;color:var(--muted);">まだ履歴がありません</div>';
  return '<div class="container">'
    +'<div class="coin-strip"><div class="coin-orb">🪙</div><div><div class="coin-val">'+(state.coins||0).toLocaleString()+'</div><div class="coin-label">LifeCoins 残高</div><div class="coin-today">今日 +'+(state.todayEarned||0)+' コイン獲得済み</div></div></div>'
    +'<div class="card"><div class="card-title">✅ 今日のタスク<span style="margin-left:auto;">'+(combos.length===0?'<button class="btn btn-outline" style="font-size:11px;padding:3px 9px;" onclick="openAddCombo()">🔥 コンボ追加</button>':'')+'</span></div>'
    +todoRows
    +'<div class="add-todo-row"><input class="add-todo-input" id="quick-todo-text" type="text" placeholder="タスクを入力..." maxlength="50"/><input class="num-input" id="quick-todo-reward" type="number" value="20" min="5" max="200" step="5" style="width:64px;"/><span style="font-size:12px;color:var(--muted);align-self:center;">🪙</span><button class="add-todo-btn" onclick="quickAddTodo()">追加</button></div>'
    +(total>0?'<div style="margin-top:12px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;"><span>進捗</span><span>'+done+'/'+total+' 完了</span></div><div class="progress-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div>'+(done===total&&total>0?'<div style="font-size:11px;color:var(--gold);margin-top:5px;font-weight:700;">🎉 全タスク完了！</div>':'<div style="font-size:11px;color:var(--muted);margin-top:5px;">全タスク完了でボーナス +50 🪙</div>')+'</div>':'')+'</div>'
    +comboSection
    +(state.focusWeekActive?'<div class="week-card" style="margin-top:14px;"><div class="week-active-tag">🔥 集中強化ウィーク 開催中！</div><div style="font-size:13px;">獲得コインが <b style="color:var(--gold)">&times;'+state.focusWeekMultiplier+' 倍</b>！</div><div style="font-size:26px;font-weight:800;color:var(--gold);margin:6px 0;">残り '+state.focusWeekDaysLeft+' 日</div></div>':'')
    +'<div class="card" style="margin-top:14px;"><div class="card-title">📜 コイン履歴</div>'+hist+'</div></div>';
}
function renderComboCard(c){const tasks=c.taskIds.map(id=>state.todos.find(t=>t.id===id)).filter(Boolean);const allDone=tasks.length>0&&tasks.every(t=>t.done),doneToday=c.lastCompletedDate===today(),dc=tasks.filter(t=>t.done).length;const chips=c.taskIds.map(id=>{const t=state.todos.find(x=>x.id===id);if(!t)return'<span class="combo-task-chip missing">(削除済)</span>';return'<span class="combo-task-chip'+(t.done?' done':'')+'">'+( t.done?'✅':'⬜')+' '+escHtml(t.text)+'</span>';}).join('');const st=doneToday?'✨ 本日達成済み！':tasks.length===0?'タスク削除済':allDone?'達成条件OK！':'あと'+(tasks.length-dc)+'個で達成';return'<div class="combo-card'+(doneToday?' done-today':'')+'"><button class="combo-del" data-cid="'+c.id+'">&times;</button><div class="combo-name">🔗 '+escHtml(c.name)+'</div><div class="combo-tasks">'+chips+'</div><div class="combo-footer"><div class="combo-bonus">+'+c.bonus+'🪙 ボーナス</div><div class="combo-status">'+st+'</div></div></div>';}
function bindHome(){document.querySelectorAll('.todo-check-btn').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();const todo=state.todos.find(t=>t.id===parseInt(btn.dataset.id));if(todo&&!todo.done)completeTodo(todo);});});document.querySelectorAll('.todo-del').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();state.todos=state.todos.filter(t=>t.id!==parseInt(btn.dataset.id));showToast('🗑️ タスクを削除しました');scheduleSave();renderPage();});});document.querySelectorAll('.combo-del').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();state.combos=state.combos.filter(c=>c.id!==parseInt(btn.dataset.cid));showToast('🗑️ コンボを削除しました');scheduleSave();renderPage();});});const inp=document.getElementById('quick-todo-text');if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')quickAddTodo();});}
function completeTodo(todo){todo.done=true;let earned=todo.reward;if(state.focusWeekActive)earned*=state.focusWeekMultiplier;state.coins=(state.coins||0)+earned;state.todayEarned=(state.todayEarned||0)+earned;state.totalEarned=(state.totalEarned||0)+earned;addHistory('plus',earned,todo.text+'—達成');showToast('✅ +'+earned+'🪙 獲得！');if(state.todos.every(t=>t.done)&&state.todos.length>0){setTimeout(()=>{state.coins+=50;state.todayEarned+=50;state.totalEarned+=50;addHistory('plus',50,'全タスク完了ボーナス');showToast('🎉 全タスク完了ボーナス +50🪙！');scheduleSave();renderPage();},600);}checkCombos();scheduleSave();renderPage();}
function checkCombos(){(state.combos||[]).forEach(c=>{if(c.lastCompletedDate===today())return;const tasks=c.taskIds.map(id=>state.todos.find(t=>t.id===id)).filter(Boolean);if(!tasks.length||!tasks.every(t=>t.done))return;c.lastCompletedDate=today();state.coins+=c.bonus;state.todayEarned+=c.bonus;state.totalEarned+=c.bonus;addHistory('plus',c.bonus,'🔥コンボ達成: '+c.name);setTimeout(()=>showToast('🔥 コンボ「'+c.name+'」達成！ +'+c.bonus+'🪙'),1000);});}
function quickAddTodo(){const tEl=document.getElementById('quick-todo-text'),rEl=document.getElementById('quick-todo-reward');if(!tEl)return;const text=tEl.value.trim(),reward=parseInt(rEl.value)||20;if(!text){showToast('❌ タスク名を入力してください');return;}state.todos.push({id:state.nextId++,text,reward,done:false});tEl.value='';scheduleSave();renderPage();setTimeout(()=>{const el=document.getElementById('quick-todo-text');if(el)el.focus();},50);}
function openAddCombo(){if((state.todos||[]).length<2){showToast('❌ コンボにはタスク2つ以上必要');return;}document.getElementById('combo-task-list').innerHTML=state.todos.map(t=>'<div class="combo-task-pick"><input type="checkbox" id="cp'+t.id+'" value="'+t.id+'"/><label for="cp'+t.id+'">'+escHtml(t.text)+'</label><span class="reward-hint">+'+t.reward+'🪙</span></div>').join('');document.getElementById('combo-name').value='';document.getElementById('combo-bonus').value='50';openModal('addcombo-modal');}
function saveCombo(){const name=document.getElementById('combo-name').value.trim(),bonus=parseInt(document.getElementById('combo-bonus').value)||50,checked=[...document.querySelectorAll('#combo-task-list input:checked')].map(cb=>parseInt(cb.value));if(!name){showToast('❌ コンボ名を入力してください');return;}if(checked.length<2){showToast('❌ 2つ以上選択してください');return;}if(!state.combos)state.combos=[];state.combos.push({id:state.nextId++,name,taskIds:checked,bonus,lastCompletedDate:null});closeModal('addcombo-modal');showToast('🔥 コンボ「'+name+'」を追加！');scheduleSave();renderPage();}
const ENTERTAINMENTS=[{id:'yt',icon:'📺',name:'YouTube',bg:'#ff000022',br:'#ff000044',basePrice:30,desc:'動画視聴',duration:30,url:'https://youtube.com'},{id:'tt',icon:'🎵',name:'TikTok',bg:'#ffffff11',br:'#ffffff22',basePrice:20,desc:'ショート動画',duration:15,url:'https://tiktok.com'},{id:'tw',icon:'🐦',name:'X',bg:'#1d9bf022',br:'#1d9bf044',basePrice:15,desc:'タイムライン',duration:15,url:'https://x.com'},{id:'ig',icon:'📸',name:'Instagram',bg:'#e1306c22',br:'#e1306c44',basePrice:15,desc:'フィード',duration:15,url:'https://instagram.com'},{id:'nt',icon:'🎬',name:'Netflix',bg:'#e5000022',br:'#e5000044',basePrice:50,desc:'動画視聴',duration:60,url:'https://netflix.com'},{id:'gm',icon:'🎮',name:'ゲーム',bg:'#7c3aed22',br:'#7c3aed44',basePrice:40,desc:'ゲームプレイ',duration:30,url:''}];
function isAccessActive(id){const u=state.access&&state.access[id];return u&&u>Date.now();}
function remainingSec(id){const u=state.access&&state.access[id];if(!u)return 0;return Math.max(0,Math.ceil((u-Date.now())/1000));}
function fmtTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function pageShop(){const mode=currentMode(),mult=getMultiplier(mode),isSurge=mode==='focus';const rows=ENTERTAINMENTS.map(e=>{const price=Math.round(e.basePrice*mult),active=isAccessActive(e.id),sec=remainingSec(e.id);if(active)return'<div class="ent-item"><div class="ent-icon" style="background:'+e.bg+';border:2px solid var(--green);">'+e.icon+'</div><div style="flex:1"><div class="ent-name">'+e.name+'</div><div class="ent-desc" style="color:var(--green);">✅ アクセス中</div></div><div class="ent-price-area" style="text-align:center;"><div class="access-timer" id="timer-'+e.id+'">'+fmtTime(sec)+'</div><div class="access-timer-label">残り時間</div>'+(e.url?'<button class="open-btn" data-url="'+e.url+'">▶ 開く</button>':'<div style="font-size:11px;color:var(--muted);margin-top:6px;">デバイスで開く</div>')+'</div></div>';const ul=e.url?e.url.replace('https://',''):'';return'<div class="ent-item"><div class="ent-icon" style="background:'+e.bg+';border:1px solid '+e.br+';filter:grayscale(60%);">🔒</div><div style="flex:1"><div class="ent-name" style="color:var(--muted);">'+e.name+'</div><div class="ent-desc">'+e.desc+'('+e.duration+'分)</div>'+(ul?'<div class="locked-url-btn" data-id="'+e.id+'">🔗 '+ul+'</div>':'')+'</div><div class="ent-price-area"><div class="ent-price '+(isSurge?'price-surge':'price-sale')+'">'+price+'🪙</div><div class="ent-price-orig">通常 '+e.basePrice+'🪙</div><div class="price-tag '+(isSurge?'tag-surge':'tag-sale')+'">'+(isSurge?'🔴 高騰中':'🟢 セール')+'</div><br><button class="buy-btn-locked '+(isSurge?'surge':'sale')+'" data-id="'+e.id+'" data-price="'+price+'" data-name="'+e.name+'" data-duration="'+e.duration+'">解除する</button></div></div>';}).join('');return'<div class="container"><div class="card"><div class="card-title">🎮 娯楽アクセス権 <span style="margin-left:auto;font-size:11px;color:var(--muted);">残高: <b style="color:var(--gold)">'+state.coins+'🪙</b></span></div>'+rows+'</div><div class="card" style="margin-top:14px;"><div class="card-title">ℹ️ 価格変動のしくみ</div><div style="font-size:12px;color:var(--muted);line-height:1.8;">・ <b style="color:#c4b5fd">集中タイム</b>(午前・午後) &rarr; &times;5<br>・ <b style="color:#6ee7b7">自由タイム</b>(昼・夜) &rarr; &times;0.5</div></div></div>';}
function bindShop(){document.querySelectorAll('.locked-url-btn').forEach(b=>{b.addEventListener('click',()=>{const name=ENTERTAINMENTS.find(e=>e.id===b.dataset.id)?.name||'';showToast('🔒 '+name+' はロック中！コインで解除してください');});});document.querySelectorAll('.buy-btn-locked').forEach(b=>{b.addEventListener('click',()=>{const id=b.dataset.id,price=parseInt(b.dataset.price),name=b.dataset.name,dur=parseInt(b.dataset.duration);if((state.coins||0)>=price){state.coins-=price;if(!state.access)state.access={};state.access[id]=Date.now()+dur*60*1000;notified5min.delete(id);addHistory('minus',price,name+'解除('+dur+'分)');showToast('🔓 '+name+' 解除！'+dur+'分アクセス可能');scheduleSave();renderPage();}else showToast('❌ コイン不足(必要: '+price+'🪙)');});});document.querySelectorAll('.open-btn').forEach(b=>{b.addEventListener('click',()=>{window.open(b.dataset.url,'_blank');});});}
// v0.5: 残り5分通知システム
let accessTimerInterval=null;
function startAccessTimer(){if(accessTimerInterval)clearInterval(accessTimerInterval);accessTimerInterval=setInterval(()=>{if(!state||!state.access)return;const now=Date.now();let expired=false;Object.keys(state.access).forEach(id=>{const until=state.access[id];if(!until)return;const sec=Math.max(0,Math.ceil((until-now)/1000));const ent=ENTERTAINMENTS.find(e=>e.id===id),name=ent?.name||id;if(until<=now){state.access[id]=null;notified5min.delete(id);expired=true;showToast('⏰ '+name+' の時間が終了しました');sendNotif('⏰ LifeRhythm',name+' のアクセス時間が終了しました');}else{const el=document.getElementById('timer-'+id);if(el)el.textContent=fmtTime(sec);if(sec<=300&&!notified5min.has(id)){notified5min.add(id);showToast('⚠️ '+name+' 残り5分！キリのいいところで終わりにしよう');sendNotif('⚠️ '+name+' 残り5分！','もうすぐ時間が終了します。キリのいいところで終わりに！');}}});if(expired){scheduleSave();if(state.currentPage==='shop')renderPage();}},1000);}
const RANKS=[{name:'Bronze',icon:'🥉',min:0,max:999},{name:'Silver',icon:'🥈',min:1000,max:2999},{name:'Gold',icon:'🥇',min:3000,max:5999},{name:'Platinum',icon:'💎',min:6000,max:9999},{name:'Diamond',icon:'💠',min:10000,max:Infinity}];
function pageRank(){const total=state.totalEarned||0,idx=RANKS.findIndex(r=>total>=r.min&&total<=r.max),rank=RANKS[idx],next=RANKS[idx+1],pct=next?Math.min(100,Math.round((total-rank.min)/(next.min-rank.min)*100)):100;const rl=RANKS.map((r,i)=>{const a=i===idx,p=i<idx;return'<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);opacity:'+(p||a?1:.4)+';"><span style="font-size:22px;">'+r.icon+'</span><div style="flex:1"><div style="font-size:14px;font-weight:'+(a?700:400)+';">'+r.name+(a?' ← 現在':'')+'</div><div style="font-size:11px;color:var(--muted);">'+r.min.toLocaleString()+' ~ '+(r.max===Infinity?'∞':r.max.toLocaleString())+'</div></div>'+(p?'<span style="color:var(--green);">✓</span>':'')+'</div>';}).join('');return'<div class="container"><div class="rank-card"><div class="rank-badge-big">'+rank.icon+'</div><div class="rank-name-big">'+rank.name+'</div><div style="font-size:12px;color:var(--muted);">全期間 '+total.toLocaleString()+' コイン獲得</div>'+(next?'<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin:12px 0 4px;"><span>'+total.toLocaleString()+'</span><span>次: '+next.name+'('+next.min.toLocaleString()+')</span></div><div class="progress-wrap"><div class="progress-bar" style="width:'+pct+'%;"></div></div><div style="font-size:11px;color:var(--muted);margin-top:5px;">あと'+(next.min-total).toLocaleString()+'コインで昇格！</div>':'<div style="font-size:13px;color:var(--gold);margin-top:10px;">🏆 最高ランク達成！</div>')+'</div><div class="card" style="margin-top:14px;"><div class="card-title">📊 統計</div><div class="stats-grid"><div class="stat-box"><div class="stat-val" style="color:#a78bfa;">'+total.toLocaleString()+'</div><div class="stat-label">全期間獲得</div></div><div class="stat-box"><div class="stat-val" style="color:#22d3ee;">'+(state.todayEarned||0)+'</div><div class="stat-label">本日獲得</div></div><div class="stat-box"><div class="stat-val" style="color:#f59e0b;">🔥 '+(state.streak||0)+'</div><div class="stat-label">連続日数</div></div><div class="stat-box"><div class="stat-val" style="color:#10b981;">'+(state.coins||0)+'</div><div class="stat-label">現在の残高</div></div></div></div><div class="card" style="margin-top:14px;"><div class="card-title">🏅 ランク一覧</div>'+rl+'</div></div>';}
function pageProfile(){const rank=RANKS.find(r=>(state.totalEarned||0)>=r.min&&(state.totalEarned||0)<=r.max);const hist=(state.history||[]).slice().reverse().map(h=>'<div class="history-item"><div class="history-sign '+h.type+'">'+(h.type==='plus'?'+':'-')+h.amount+'</div><div class="history-desc">'+h.desc+'</div><div class="history-time">'+h.time+'</div></div>').join('')||'<div style="font-size:13px;color:var(--muted);">まだ履歴なし</div>';const np=typeof Notification!=='undefined'?Notification.permission:'unsupported';return'<div class="container"><div class="profile-hero"><div style="font-size:52px;margin-bottom:8px;">😎</div><div style="font-size:20px;font-weight:800;">'+(state.displayName||'ユーザー')+'</div><div style="font-size:12px;color:var(--muted);margin-top:4px;">'+(currentUser?.email||'')+'</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;"><span style="background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;">'+rank.icon+' '+rank.name+'</span><span style="background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;">🔥 '+(state.streak||0)+'日連続</span>'+(state.focusWeekActive?'<span style="background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;">⚡ 集中強化中</span>':'')+'</div></div>'+'<div class="card"><div class="card-title">⚙️ 設定</div><div class="setting-row"><div><div style="font-size:14px;">集中強化ウィーク</div><div style="font-size:11px;color:var(--muted);">コイン&times;'+state.focusWeekMultiplier+'倍</div></div><label class="toggle"><input type="checkbox" id="toggle-week" '+(state.focusWeekActive?'checked':'')+'/><span class="toggle-slider"></span></label></div><div class="setting-row"><div><div style="font-size:14px;">ニックネーム変更</div></div><button class="btn btn-outline" style="font-size:12px;padding:5px 10px;" onclick="changeName()">変更</button></div><div class="setting-row"><div><div style="font-size:14px;">残り5分通知</div><div style="font-size:11px;color:var(--muted);">娯楽の残り5分で通知</div></div><button class="btn btn-outline" style="font-size:12px;padding:5px 10px;" onclick="requestNotifPermission()">'+(np==='granted'?'✅ 許可済み':np==='denied'?'🚫 拒否済み':'許可する')+'</button></div></div>'+'<div class="card" style="margin-top:14px;"><div class="card-title">📜 コイン履歴(全件)</div>'+hist+'</div></div>';}
function bindProfile(){const tw=document.getElementById('toggle-week');if(tw)tw.addEventListener('change',()=>{state.focusWeekActive=tw.checked;showToast(tw.checked?'🔥 集中強化ウィーク参加！':'集中強化ウィーク 離脱');scheduleSave();});}
function changeName(){const n=prompt('新しいニックネーム:',state.displayName||'');if(n&&n.trim()){state.displayName=n.trim();document.getElementById('user-name-disp').textContent=state.displayName;showToast('✅ 「'+state.displayName+'」に変更');scheduleSave();renderPage();}}
function addHistory(type,amount,desc){if(!state.history)state.history=[];const now=new Date(),t=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');state.history.push({type,amount,desc,time:t});if(state.history.length>100)state.history=state.history.slice(-100);}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
setInterval(updateClock,30000);
</script>
</body>
</html>
